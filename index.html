async function doDeleteUser(userId) {
  state.users = state.users.filter(u => u.id != userId);
  state.projects.forEach(p => {
    p.memberIds = p.memberIds.filter(id => id != userId);
    dbSave('projects', 'update', { updates: { memberIds: p.memberIds }, id: p.id }, 'id');
  });
  if (useSupabase && sb) {
    try { await sb.from('users').delete().eq('id', userId); } catch (e) {}
  }
  saveLocalState();
  hideModal();
  showToast('User removed', '#ff6b8a');
  renderAdminPage();
}

async function toggleProjectMember(projectId, userId) {
  const p = state.projects.find(p => p.id == projectId);
  if (!p) return;
  if (p.memberIds.some(id => id == userId)) p.memberIds = p.memberIds.filter(id => id != userId);
  else p.memberIds.push(userId);
  await dbSave('projects', 'update', { updates: { memberIds: p.memberIds }, id: p.id }, 'id');
  renderAdminPage();
}

async function clearProjectData() {
  const pId = session.currentProjectId;
  if (!pId) return;
  state.scans = state.scans.filter(s => s.projectId != pId);
  state.trays = state.trays.filter(t => t.projectId != pId);
  state.trayCounters[pId] = 0;
  if (useSupabase) {
    try {
      await sb.from('scans').delete().eq('projectId', pId);
      await sb.from('trays').delete().eq('projectId', pId);
    } catch (e) { console.error(e); }
  }
  saveLocalState();
  showToast("Project data cleared", "#FFD700");
  renderAdminPage();
}

async function promptDeleteProject(pId, name) {
  if (confirm(`Are you SURE you want to delete project "${name}"? This cannot be undone.`)) {
    state.projects = state.projects.filter(p => p.id != pId);
    state.scans = state.scans.filter(s => s.projectId != pId);
    state.trays = state.trays.filter(t => t.projectId != pId);
    if (useSupabase) {
      try {
        await sb.from('projects').delete().eq('id', pId);
        await sb.from('scans').delete().eq('projectId', pId);
        await sb.from('trays').delete().eq('projectId', pId);
      } catch (e) { console.error(e); }
    }
    saveLocalState();
    switchProject();
  }
}

async function promptResetAllData() {
  if (!confirm('WARNING: This will delete ALL projects, trays, and scans across the entire system. This cannot be undone. Are you sure?')) return;
  if (!confirm('FINAL CONFIRMATION: Type OK to confirm you want to wipe everything.')) return;
  
  state.projects = [];
  state.scans = [];
  state.trays = [];
  state.trayCounters = {};
  
  if (useSupabase && sb) {
    try {
      await sb.from('scans').delete().neq('id', '');
      await sb.from('trays').delete().neq('id', '');
      await sb.from('projects').delete().neq('id', '');
    } catch (e) { console.error('Reset all data error:', e); }
  }
  saveLocalState();
  showToast('All system data has been reset', '#ff6b8a');
  switchProject();
}

async function handleCSVImport() {
  const fileInput = document.getElementById("csv-upload");
  if (!fileInput.files || fileInput.files.length === 0) {
    showToast("Please select a CSV file", "#ff6b8a");
    return;
  }
  const file = fileInput.files[0];
  const text = await file.text();
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length < 2) { showToast("CSV is empty or missing headers", "#ff6b8a"); return; }
  
  const parseLine = (line) => {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') inQuotes = !inQuotes;
      else if (line[i] === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    result.push(cur.trim());
    return result;
  };
  
  const headers = parseLine(lines[0]);
  const normHeaders = headers.map(h => h.toLowerCase().replace(/[^a-z]/g, ''));
  
  const idxPart = normHeaders.findIndex(h => h.includes('part'));
  const idxTray = normHeaders.findIndex(h => h === 'tray' || h === 'traynumber');
  const idxBrand = normHeaders.findIndex(h => h.includes('brand'));
  const idxGen = normHeaders.findIndex(h => h.includes('gen'));
  const idxSerial = normHeaders.findIndex(h => h.includes('serial'));
  const idxQty = normHeaders.findIndex(h => h.includes('qty') || h.includes('quantity'));
  const idxScan = normHeaders.findIndex(h => h.includes('scan') || h.includes('qr'));
  
  const firstRow = lines.length > 1 ? parseLine(lines[1]) : [];
  
  const getOptions = (selectedIdx) => {
    return `<option value="-1">-- Ignore / Not in CSV --</option>` + 
           headers.map((h, i) => `<option value="${i}" ${i === selectedIdx ? 'selected' : ''}>[Col ${i+1}] ${escapeHtml(h)} (e.g. ${escapeHtml(firstRow[i] || '')})</option>`).join('');
  };
  
  const modalHTML = `
    <h2 class="h2" style="margin-bottom: 0.5rem;">Map CSV Columns</h2>
    <div style="font-size: 0.85rem; color: #888; margin-bottom: 1.5rem;">
      Assign your CSV columns to system fields. <br>
      <i style="color: #FFD700;">Note: For a "Clean Slate", use <b>Admin > Clear Project Data</b> before importing.</i>
    </div>
    
    <div class="field" style="margin-bottom: 1.5rem;">
      <div class="label" style="color: #3ed685; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Import Method</div>
      <select id="import-method" style="width: 100%; min-height: 2.75rem; background: #15151c; color: #fff; border: 1px solid #3ed685; border-radius: 0.5rem; padding: 0 0.75rem; font-weight: 700;">
        <option value="sync">Update Existing (Smart Sync - Prevents doubling)</option>
        <option value="append">Add New (Simple Append - Adds everything as new)</option>
      </select>
    </div>

    <div style="display: grid; gap: 0.75rem; margin-bottom: 1.5rem;">
      <div>
        <div class="label" style="color: #FFD700; font-size: 0.75rem; margin-bottom: 0.25rem;">Part Number *</div>
        <select id="map-part" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxPart)}</select>
      </div>
      <div>
        <div class="label" style="color: #FFD700; font-size: 0.75rem; margin-bottom: 0.25rem;">Tray Number *</div>
        <select id="map-tray" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxTray)}</select>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div>
          <div class="label" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Brand</div>
          <select id="map-brand" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxBrand)}</select>
        </div>
        <div>
          <div class="label" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Generation</div>
          <select id="map-gen" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxGen)}</select>
        </div>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
        <div>
          <div class="label" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Serial Number</div>
          <select id="map-serial" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxSerial)}</select>
        </div>
        <div>
          <div class="label" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Quantity</div>
          <select id="map-qty" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxQty)}</select>
        </div>
      </div>
      <div>
        <div class="label" style="font-size: 0.75rem; margin-bottom: 0.25rem;">QR Scan Input (Raw string)</div>
        <select id="map-scan" style="width: 100%; min-height: 2.25rem; background: #1a1a22; color: #fff; border: 1px solid #2a2a35; border-radius: 0.5rem; padding: 0 0.75rem;">${getOptions(idxScan)}</select>
      </div>
    </div>
    
    <div class="flex items-center justify-between" style="margin-top: 1rem;">
      <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn" onclick="executeCSVImport()">Confirm & Import ${lines.length - 1} Rows</button>
    </div>
  `;
  
  window._pendingCSVImportLines = lines;
  window._pendingCSVImportParseLine = parseLine;
  showModal(modalHTML);
}

async function executeCSVImport() {
  const lines = window._pendingCSVImportLines;
  const parseLine = window._pendingCSVImportParseLine;
  if (!lines || !parseLine) return;
  
  const method = document.getElementById("import-method")?.value || "sync";
  const idxPart = parseInt(document.getElementById("map-part").value, 10);
  const idxTray = parseInt(document.getElementById("map-tray").value, 10);
  const idxBrand = parseInt(document.getElementById("map-brand").value, 10);
  const idxGen = parseInt(document.getElementById("map-gen").value, 10);
  const idxSerial = parseInt(document.getElementById("map-serial").value, 10);
  const idxQty = parseInt(document.getElementById("map-qty").value, 10);
  const idxScan = parseInt(document.getElementById("map-scan")?.value || "-1", 10);
  
  if (idxPart === -1 || idxTray === -1) {
    showToast("Part Number and Tray columns are required.", "#ff6b8a");
    return;
  }
  
  hideModal();
  document.getElementById("page-content").innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 4rem;">
      <div id="import-progress" style="color: #FFD700; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">${method==='sync'?'Syncing':'Importing'} CSV Data...</div>
      <div id="import-stats" style="color: #888;">Processing rows...</div>
    </div>`;
  
  await new Promise(r => setTimeout(r, 50));
  
  let totalAdded = 0;
  let skipped = 0;
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const progressEl = document.getElementById("import-progress");
  const statsEl = document.getElementById("import-stats");
  window.isBulkScanning = true;

  for (let i = 1; i < lines.length; i++) {
    if (i % 15 === 0) {
      progressEl.textContent = `Processing row ${i} of ${lines.length - 1}...`;
      statsEl.textContent = `${totalAdded} sticks added, ${skipped} skipped`;
      await new Promise(r => setTimeout(r, 5)); 
    }

    const cols = parseLine(lines[i]);
    if (cols.length <= idxPart || cols.length <= idxTray) { skipped++; continue; }
    
    const partNum = cols[idxPart]?.trim().toUpperCase();
    if (!partNum || partNum === '#VALUE!') { skipped++; continue; }
    
    const targetTrayNum = parseInt(cols[idxTray], 10);
    if (isNaN(targetTrayNum)) { skipped++; continue; }

    const brand = idxBrand >= 0 ? cols[idxBrand]?.trim() : "Unknown";
    const gen = idxGen >= 0 && cols[idxGen] !== '#VALUE!' ? cols[idxGen]?.trim() : "Unknown";
    const serial = idxSerial >= 0 && cols[idxSerial] !== '-' ? cols[idxSerial]?.trim() : "";
    const scanRaw = idxScan >= 0 ? cols[idxScan]?.trim() : `CSV_ROW_${i}_${partNum}`;
    let targetTotalQty = 1;
    if (idxQty >= 0) {
      const parsedQty = parseInt(cols[idxQty], 10);
      if (!isNaN(parsedQty) && parsedQty > 0) targetTotalQty = parsedQty;
    }

    const classification = { partNumber: partNum, brand, generation: gen, serial, label: "" };

    let currentTray = state.trays.find(t => t.projectId == project.id && t.trayNum == targetTrayNum);
    
    if (currentTray) {
      if (currentTray.partNumber.toUpperCase() !== partNum) {
        // Different part - skip or force new assignment
        const assignment = await assignTray(project.id, session.currentUser.id, classification);
        currentTray = assignment.isNew ? { ...assignment.tray, sticks: [] } : state.trays.find(t => t.id == assignment.tray.id);
        if (assignment.isNew) {
           state.trays.push(currentTray);
           await dbSave('trays', 'insert', currentTray);
        }
      }
    } else {
      currentTray = {
        id: generateId('t'), projectId: project.id, ownerUserId: session.currentUser.id,
        partNumber: partNum, label: "", brand, generation: gen,
        trayNum: targetTrayNum, capacity: project.defaultCap, sticks: [],
        createdAt: Date.now(), createdBy: session.currentUser.id, projectName: project.name
      };
      state.trays.push(currentTray);
      state.trayCounters[project.id] = Math.max(state.trayCounters[project.id] || 0, targetTrayNum);
      await dbSave('trays', 'insert', currentTray);
    }

    let toAdd = (method === "sync") ? Math.max(0, targetTotalQty - currentTray.sticks.length) : targetTotalQty;
    if (toAdd === 0) { skipped++; continue; }
    
    while (toAdd > 0) {
      let space = currentTray.capacity - currentTray.sticks.length;
      
      if (space <= 0) {
        const assignment = await assignTray(project.id, session.currentUser.id, classification);
        if (!assignment) break; 
        if (assignment.isNew) {
          currentTray = { ...assignment.tray, sticks: [] };
          state.trays.push(currentTray);
          state.trayCounters[project.id] = Math.max(state.trayCounters[project.id] || 0, currentTray.trayNum);
          await dbSave('trays', 'insert', currentTray);
        } else {
          currentTray = state.trays.find(t => t.id == assignment.tray.id);
        }
        space = currentTray.capacity - currentTray.sticks.length;
      }

      const batch = Math.min(space, toAdd);
      if (batch > 0) {
        for (let b = 0; b < batch; b++) {
          const scanId = generateId('s');
          const newScan = {
            id: scanId, projectId: project.id, userId: session.currentUser.id,
            ts: Date.now() + i + (totalAdded * 0.001), scan: scanRaw,
            result: { ...classification, method: "csv_import" },
            trayId: currentTray.id
          };
          currentTray.sticks.push(scanId);
          state.scans.unshift(newScan);
          await dbSave('scans', 'insert', newScan);
        }
        await dbSave('trays', 'update', { updates: { sticks: currentTray.sticks }, id: currentTray.id }, 'id');
        totalAdded += batch;
        toAdd -= batch;
      } else break;
    }
  }
  
  window.isBulkScanning = false;
  window._pendingCSVImportLines = null;
  window._pendingCSVImportParseLine = null;
  const fileInput = document.getElementById("csv-upload");
  if (fileInput) fileInput.value = "";
  
  showToast(`Import complete: ${totalAdded} sticks added${skipped > 0 ? ` · ${skipped} rows skipped` : ''}.`, "#3ed685");
  render(); 
}

    <div class="flex gap-12" style="justify-content: flex-end;">

function doPrintLabel(trayId) {
  const tray = state.trays.find(t => t.id == trayId);
  if (!tray) return;
  const brandColor = BRAND_META[tray.brand]?.hex || "#5F5E5A";
  const labelHTML = buildLabelHTML(tray, brandColor);
  document.getElementById("print-area").innerHTML = labelHTML;
  document.getElementById("print-area").classList.add("show");
  hideModal();
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      document.getElementById("print-area").classList.remove("show");
    }, 500);
  }, 100);
}

function buildLabelHTML(tray, brandColor) {
  const date = new Date(tray.createdAt).toLocaleDateString();
  // Clean part number for barcode (remove special chars that might break Code128)
  const barcodeText = tray.partNumber.toUpperCase().replace(/[^A-Z0-9\-]/gi, '');
  // bwip-js settings for clear, tall, full-width barcode
  // height is in mm, scale=3 for high res, includetext=true to see text below
  const barcodeUrl = `https://bwipjs-api.metafloor.com/?bcid=code128&text=${encodeURIComponent(barcodeText)}&scale=3&rotate=N&height=15&includetext&textsize=8&textyoffset=2`;
  
  return `
    <div style="width: 4in; height: 1.5in; box-sizing: border-box; display: flex; flex-direction: column; padding: 0.08in 0.15in; font-family: 'Helvetica', Arial, sans-serif; color: #000; background: #fff; overflow: hidden; border: 1px solid #ddd;">
      <!-- Top Info Row -->
      <div style="display: flex; justify-content: space-between; align-items: center; font-size: 10pt; border-bottom: 2pt solid #000; padding-bottom: 3pt; margin-bottom: 5pt;">
        <span style="font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px;">${escapeHtml(tray.projectName)}</span>
        <span style="display: flex; gap: 8px;">
          <span style="border: 1.5pt solid #000; padding: 1pt 8pt; font-size: 9pt; font-weight: 900;">${escapeHtml(tray.brand.toUpperCase())}</span>
          <span style="background: #000; color: #fff; padding: 1pt 8pt; font-size: 9pt; font-weight: 900;">${escapeHtml(tray.generation)}</span>
        </span>
      </div>
      
      <!-- Middle Content Area -->
      <div style="display: flex; flex: 1; align-items: flex-start; gap: 0.2in;">
        <div style="display: flex; flex-direction: column; align-items: center; min-width: 0.9in;">
          <div style="font-size: 44pt; font-weight: 900; line-height: 0.8; letter-spacing: -2pt;">#${tray.trayNum}</div>
          <div style="font-size: 7pt; font-weight: 800; text-transform: uppercase; margin-top: 4pt;">TRAY NUMBER</div>
        </div>
        
        <div style="flex: 1; min-width: 0;">
          <div style="font-family: 'Courier New', monospace; font-size: 14pt; font-weight: 900; word-break: break-all; line-height: 1.1; margin-bottom: 2pt;">${escapeHtml(tray.partNumber)}</div>
          <div style="font-size: 8pt; color: #000; font-weight: 600;">CAP: ${tray.capacity} · ${date}</div>
          <div style="margin-top: 4pt; font-size: 10pt; font-weight: 900; border: 1.5pt solid #000; padding: 2pt 8pt; display: inline-block;">QTY: ________</div>
        </div>
      </div>

      <!-- Bottom Barcode Spread -->
      <div style="margin-top: auto; padding-top: 4pt; display: flex; flex-direction: column; align-items: center;">
        <img src="${barcodeUrl}" style="width: 3.5in; height: 0.5in; object-fit: fill; image-rendering: pixelated; display: block;" alt="Barcode" />
      </div>
    </div>
  `;
}

/* ════════════════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}
function showModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal").classList.add("show");
}
function hideModal() {
  document.getElementById("modal").classList.remove("show");
}
function showToast(msg, color) {
  const c = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = "toast";
  t.style.color = color;
  t.style.border = `2px solid ${color}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

/* ════════════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════════════ */
render(); // Show loading screen immediately
initSupabaseState(); // Then fetch from Supabase in background
function setGlobalSearch(val) {
  globalSearchQuery = val;
  // Re-render the specific content page without re-rendering the whole shell so we don't lose focus
  if (session.page === "trays") renderTraysPage();
  else if (session.page === "history") renderHistoryPage();
  else if (session.page === "master") renderMasterPage();
}

function setPage(p) { session.page = p; globalSearchQuery = ""; render(); }
function switchProject() { session.currentProjectId = null; session.page = "projects"; globalSearchQuery = ""; render(); }

function toggleEnginePopup(ev) {
  ev.stopPropagation();
  const popup = document.getElementById("engine-popup");
  if (popup.style.display === "block") {
    popup.style.display = "none";
    return;
  }
  popup.innerHTML = `
    ${[
      { id: "rule",   label: "Rules only",   desc: "Pattern-matching · free forever",       color: "#888"    },
      { id: "gemini", label: "Gemini",       desc: "Google free tier · 15 req/min",         color: "#4fa3ff" },
    ].map(opt => `
      <button class="engine-opt ${state.engine === opt.id ? 'active' : ''}" onclick="setEngine('${opt.id}')">
        <div style="width: 8px; height: 8px; border-radius: 50%; background: ${opt.color};"></div>
        <div style="flex: 1;">
          <div style="font-size: 13px; font-weight: 700; color: #fff;">${opt.label}</div>
          <div style="font-size: 11px; color: #888;">${opt.desc}</div>
        </div>
        ${state.engine === opt.id ? `<div style="color: ${opt.color}; font-size: 12px;">✓</div>` : ""}
      </button>
    `).join("")}
    ${state.engine === "gemini" ? `
      <div style="margin-top: 8px; padding: 10px 12px; background: #15151c; border-radius: 8px;">
        <div style="font-size: 10px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px;">Gemini API key</div>
        <input type="text" id="gemini-key" placeholder="paste from aistudio.google.com" value="${state.geminiKey || ''}" 
          onchange="saveGeminiKey(this.value)" style="font-size: 12px; padding: 6px 8px;" />
        <div style="font-size: 10px; color: #666; margin-top: 6px;">
          <a href="https://aistudio.google.com/apikey" target="_blank" style="color: #4fa3ff;">Get free key →</a>
        </div>
      </div>
    ` : ""}
  `;
  popup.style.display = "block";
  setTimeout(() => {
    document.addEventListener("click", closeEnginePopup, { once: true });
  }, 50);
}
function closeEnginePopup() {
  const p = document.getElementById("engine-popup");
  if (p) p.style.display = "none";
}
async function setEngine(e) { 
  state.engine = e; 
  await dbSave('settings', 'upsert', { key: 'engine', value: e });
  closeEnginePopup(); 
  render(); 
}
async function saveGeminiKey(v) { 
  state.geminiKey = v; 
  await dbSave('settings', 'upsert', { key: 'geminiKey', value: v });
}
</script>
