<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDR Tray Scanner</title>
<style>
  /* ─── Reset & base ──────────────────────────────────────────────────── */
  *,*::before,*::after { box-sizing: border-box; }
  
  html {
    font-size: 16px;
  }
  @media (min-width: 1600px) {
    html { font-size: 18px; }
  }

  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f;
    color: #e8e8ee;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    line-height: 1.5;
  }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  
  /* ─── Layout primitives ─────────────────────────────────────────────── */
  .page { 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    padding: 2rem; 
  }
  
  .container, .page-wrapper {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
    width: 100%;
    box-sizing: border-box;
  }
  
  /* ─── Auth ──────────────────────────────────────────────────────────── */
  .auth-card {
    background: #1a1a22;
    border-radius: 1rem;
    padding: 2.5rem;
    width: 100%;
    max-width: 25rem;
    box-shadow: 0 1rem 3rem rgba(0,0,0,0.4);
  }
  .logo { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
  .logo-icon {
    width: 3rem; height: 3rem; border-radius: 0.75rem;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.5rem; color: #1a1a2e;
  }
  .logo-title { font-size: 1.5rem; font-weight: 800; color: #FFD700; letter-spacing: -0.025em; }
  .logo-sub { font-size: 0.75rem; color: #888; letter-spacing: 0.05em; }
  
  .tabs { display: flex; margin-bottom: 1.5rem; background: #15151c; border-radius: 0.625rem; padding: 0.25rem; }
  .tab { 
    flex: 1; padding: 0.75rem 0; border: 0; background: transparent; 
    color: #888; font-weight: 700; font-size: 0.75rem; border-radius: 0.5rem; 
    text-transform: uppercase; letter-spacing: 0.06em; 
  }
  .tab.active { background: #FFD700; color: #1a1a2e; }
  
  /* ─── Form elements ─────────────────────────────────────────────────── */
  .field { margin-bottom: 1rem; }
  .label { font-size: 0.75rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; display: block; }
  
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%; background: #0a0a0f; border: 1px solid #2a2a35; color: #fff;
    padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 1rem; outline: none;
    min-height: 2.75rem; /* ~44px */
  }
  input:focus, textarea:focus, select:focus { border-color: #FFD700; }
  textarea { resize: vertical; min-height: 7rem; font-family: ui-monospace, monospace; line-height: 1.5; }
  
  /* ─── Buttons ───────────────────────────────────────────────────────── */
  .btn {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #1a1a2e; border: 0; padding: 0.75rem 1.5rem; border-radius: 0.625rem;
    font-size: 1rem; font-weight: 800; letter-spacing: 0.03em;
    min-height: 2.75rem; display: inline-flex; align-items: center; justify-content: center;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: #888; border: 1px solid #2a2a35;
    padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600;
    min-height: 2.75rem; display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-ghost:hover { color: #fff; border-color: #444; }
  .btn-block { width: 100%; }
  
  /* ─── Notifications ─────────────────────────────────────────────────── */
  .alert { padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 600; margin-top: 0.5rem; }
  .alert-error { background: #3a1520; color: #ff6b8a; }
  .alert-success { background: #0a2818; color: #3ed685; }
  .alert-info { background: #0f2240; color: #4fa3ff; }
  
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: #1a1a22; padding: 1rem 1.5rem; border-radius: 0.625rem;
    font-weight: 700; font-size: 0.9rem;
    box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.5);
    z-index: 200; animation: slide-in 0.2s ease-out;
  }
  @keyframes slide-in { from { opacity: 0; transform: translateY(0.5rem); } to { opacity: 1; transform: translateY(0); } }
  
  /* ─── Top bar ───────────────────────────────────────────────────────── */
  .topbar {
    background: #0f0f15; border-bottom: 1px solid #1f1f28;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-inner {
    width: 100%; max-width: 1400px; margin: 0 auto; padding: 0.75rem 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .nav { flex: 1; display: flex; gap: 0.25rem; justify-content: center; }
  .nav button {
    background: transparent; color: #888; font-weight: 700; font-size: 0.9rem;
    padding: 0.6rem 1.2rem; border-radius: 0.5rem; border: 0; letter-spacing: 0.02em;
    min-height: 2.75rem;
  }
  .nav button.active { background: #FFD700; color: #1a1a2e; }
  .nav button:hover:not(.active) { color: #fff; }
  
  .avatar {
    width: 2rem; height: 2rem; border-radius: 50%; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem;
  }
  .avatar-sm { width: 1.5rem; height: 1.5rem; font-size: 0.7rem; }
  .avatar-xs { width: 1.375rem; height: 1.375rem; font-size: 0.65rem; border: 2px solid #1a1a22; }
  
  /* ─── Cards & panels ────────────────────────────────────────────────── */
  .card { background: #1a1a22; border-radius: 0.875rem; padding: 1.5rem; }
  .card-tight { padding: 1rem; }
  
  /* ─── Project cards ─────────────────────────────────────────────────── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    width: 100%;
  }
  .proj-card {
    text-align: left; border: 0; background: #1a1a22;
    border-radius: 1rem; padding: 1.5rem;
    transition: background 0.15s;
    min-height: 8rem;
  }
  .proj-card:hover { background: #22222d; }
  .proj-card.mixed { border-top: 4px solid #3ed685; }
  .proj-card.separate { border-top: 4px solid #4fa3ff; }
  
  .badge {
    font-size: 0.8rem; font-weight: 800; letter-spacing: 0.06em;
    padding: 0.25rem 0.5rem; border-radius: 0.25rem;
    text-transform: uppercase;
  }
  .badge-mixed    { background: #0a2818; color: #3ed685; }
  .badge-separate { background: #0f2240; color: #4fa3ff; }
  .badge-full     { background: #3a1520; color: #ff6b8a; }
  .badge-active   { background: #0a2818; color: #3ed685; }
  
  /* ─── Mode picker ───────────────────────────────────────────────────── */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .mode-opt {
    text-align: left; border: 2px solid #2a2a35; background: transparent;
    border-radius: 0.75rem; padding: 1rem; transition: all 0.15s;
  }
  .mode-opt.active.mixed { border-color: #3ed685; background: #15151c; }
  .mode-opt.active.separate { border-color: #4fa3ff; background: #15151c; }
  
  /* ─── Tray cards ────────────────────────────────────────────────────── */
  .tray-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }
  .tray-card { 
    background: #1a1a22; 
    border-radius: 1.25rem; 
    padding: 1.5rem; 
    border: 1px solid #2a2a35;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .tray-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 1rem 2rem rgba(0,0,0,0.4);
    border-color: #3a3a45;
  }
  .tray-progress { 
    height: 0.5rem; 
    background: #0a0a0f; 
    border-radius: 1rem; 
    overflow: hidden; 
    margin: 1rem 0;
  }
  .tray-progress-fill { 
    height: 100%; 
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
  }
  
  /* ─── Brand pills ───────────────────────────────────────────────────── */
  .pill {
    color: #fff; padding: 0.25rem 0.5rem; border-radius: 0.25rem;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.03em;
  }
  .pill-large { padding: 0.375rem 0.75rem; font-size: 0.8rem; }
  
  /* ─── Engine toggle ─────────────────────────────────────────────────── */
  .engine-btn {
    display: flex; align-items: center; gap: 0.5rem;
    background: #15151c; border: 1px solid #2a2a35;
    padding: 0.5rem 0.75rem; border-radius: 0.5rem;
    min-height: 2.75rem;
  }
  .engine-dot { width: 0.375rem; height: 0.375rem; border-radius: 50%; }
  .engine-popup {
    position: absolute; top: calc(100% + 0.375rem); right: 0;
    background: #1a1a22; border: 1px solid #2a2a35; border-radius: 0.75rem;
    padding: 0.5rem; width: 17.5rem; z-index: 100;
    box-shadow: 0 0.75rem 2rem rgba(0,0,0,0.4);
  }
  .engine-opt {
    width: 100%; text-align: left; border: 0; background: transparent;
    padding: 0.625rem 0.75rem; border-radius: 0.5rem; margin-bottom: 0.125rem;
    display: flex; align-items: center; gap: 0.625rem;
    min-height: 2.75rem;
  }
  .engine-opt.active { background: #15151c; }
  .engine-opt:hover { background: #15151c; }
  
  /* ─── Modal ─────────────────────────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 300;
    align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: #1a1a22; border-radius: 0.875rem; padding: 1.5rem;
    max-width: 35rem; width: 100%; max-height: 85vh; overflow: auto;
  }
  
  /* ─── Empty states ──────────────────────────────────────────────────── */
  .empty { background: #1a1a22; border-radius: 0.75rem; padding: 3rem 1.5rem; text-align: center; color: #aaa; font-size: 1rem; }
  
  /* ─── Stats ─────────────────────────────────────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .stat { background: #1a1a22; border-radius: 0.75rem; padding: 1rem; }
  .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; }
  .stat-value { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.05em; }
  
  /* ─── Headings ──────────────────────────────────────────────────────── */
  h1.h { font-size: 1.5rem; font-weight: 800; color: #FFD700; letter-spacing: -0.025em; margin: 0 0 1rem; }
  h2.h2 { font-size: 1.1rem; font-weight: 700; color: #e8e8ee; letter-spacing: -0.015em; margin: 0; }
  
  /* ─── Tables ────────────────────────────────────────────────────────── */
  .history-row {
    display: grid;
    grid-template-columns: 1fr 1.5fr 0.8fr 0.7fr 0.6fr 0.7fr 0.7fr;
    gap: 0.75rem; padding: 0.75rem 1rem;
    border-bottom: 1px solid #15151c; align-items: center;
    font-size: 0.85rem;
  }
  .history-head { background: #15151c; font-size: 0.75rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
  
  /* ─── Print styles for Zebra GK420d ─────────────────────────────────── */
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area {
      position: absolute !important;
      left: 0 !important; top: 0 !important;
      width: 4in !important; height: 1.5in !important;
      page-break-inside: avoid;
    }
    @page { size: 4in 1.5in; margin: 0; }
    body, html { height: auto !important; }
    #root, #modal, #toast-container { display: none !important; }
    #print-area { 
      display: block !important; 
      position: static !important; 
      width: 4in; 
      height: 1.5in; 
      overflow: hidden;
    }
  }
  #print-area { display: none; }
  #print-area.show { display: block; position: absolute; left: -9999px; }
  
  /* ─── Utility ───────────────────────────────────────────────────────── */
  .mono { font-family: ui-monospace, "SF Mono", monospace; font-size: 1rem; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .flex { display: flex; }
  .flex-1 { flex: 1; }
  .gap-8 { gap: 0.5rem; }
  .gap-12 { gap: 0.75rem; }
  .gap-16 { gap: 1rem; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  
  @media (max-width: 1200px) {
    .proj-grid { grid-template-columns: repeat(2, 1fr); }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 768px) {
    .container { padding: 1rem; }
    .topbar-inner { flex-wrap: wrap; padding: 1rem; }
    .nav { order: 3; width: 100%; flex-wrap: wrap; margin-top: 1rem; }
    .proj-grid { grid-template-columns: 1fr; }
    .history-row { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .history-head { display: none; }
    .scanner-layout { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="root"></div>

<!-- Modal container (shared) -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this) hideModal()">
  <div class="modal-content" id="modal-content"></div>
</div>

<!-- Print area for Zebra labels -->
<div id="print-area"></div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
"use strict";

/* ════════════════════════════════════════════════════════════════════════
   SUPABASE STATE MANAGEMENT
   ════════════════════════════════════════════════════════════════════════ */
const SUPABASE_URL = "https://sbtrnftngswxivqkssjj.supabase.co";
const SUPABASE_KEY = "sb_publishable_8KoKaF_nxbZzVKjNPDZPww_W60Qex-I";

let sb = null; // Supabase client — initialized safely below
try {
  if (window.supabase && window.supabase.createClient) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch (e) { console.warn("Supabase init failed:", e); }

const STORAGE_KEY = "ddr_scanner_v5";
const DEFAULT_STATE = {
  users: [
    { id: "u1", username: "admin",      password: "admin", role: "admin",      name: "Admin",    color: "#FFD700" },
    { id: "u2", username: "mohan",      password: "demo",  role: "scanner",    name: "Mohan C.", color: "#1428A0" },
    { id: "u3", username: "ashu",       password: "demo",  role: "scanner",    name: "Ashu",     color: "#CC0000" },
    { id: "u4", username: "ronny",      password: "demo",  role: "scanner",    name: "Ronny",    color: "#007A33" },
    { id: "u5", username: "supervisor", password: "demo",  role: "supervisor", name: "Lead",     color: "#E65100" },
  ],
  projects: [
    { id: "p1", name: "DDR Sort \u2014 Q4", mode: "mixed",    memberIds: ["u2","u3","u4"], defaultCap: 50,  autoprint: true,  createdBy: "u1", createdAt: Date.now() - 86400000 },
    { id: "p2", name: "Bulk Audit",     mode: "separate", memberIds: ["u2","u5"],     defaultCap: 100, autoprint: true,  createdBy: "u1", createdAt: Date.now() - 3600000  },
  ],
  scans: [], trays: [], trayCounters: {}, engine: "rule", geminiKey: "",
};

let state = {
  users: [], projects: [], scans: [], trays: [], trayCounters: {}, engine: "rule", geminiKey: ""
};
let stateLoaded = false;
let useSupabase = !!sb;
let globalSearchQuery = "";
let scanMode = "single";

function loadLocalState() {
  try {
    let raw = localStorage.getItem(STORAGE_KEY);
    
    // Auto-migrate from older versions if current key is empty
    if (!raw) {
      const olderKeys = ["ddr_scanner_v4", "ddr_scanner_v3", "ddr_scanner_v2", "ddr_scanner_v1", "ddr_scanner"];
      for (const oldKey of olderKeys) {
        const oldData = localStorage.getItem(oldKey);
        if (oldData) {
          raw = oldData;
          console.log(`Migrated data from ${oldKey} to ${STORAGE_KEY}`);
          // Save immediately under the new key
          localStorage.setItem(STORAGE_KEY, raw);
          break;
        }
      }
    }
    
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    return { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...JSON.parse(raw) };
  } catch { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function saveLocalState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn("Save failed:", e); }
}

async function initSupabaseState() {
  if (!sb) {
    // Supabase not available — fall back to localStorage
    console.warn("Supabase not available, using localStorage");
    state = loadLocalState();
    useSupabase = false;
    stateLoaded = true;
    render();
    return;
  }
  try {
    const [usersRes, projectsRes, scansRes, traysRes, settingsRes] = await Promise.all([
      sb.from('users').select('*'),
      sb.from('projects').select('*'),
      sb.from('scans').select('*').order('ts', { ascending: false }),
      sb.from('trays').select('*'),
      sb.from('settings').select('*')
    ]);

    // Check for errors
    if (usersRes.error || projectsRes.error) {
      throw new Error(usersRes.error?.message || projectsRes.error?.message || 'Fetch failed');
    }

    if (usersRes.data) state.users = usersRes.data;
    if (projectsRes.data) state.projects = projectsRes.data;
    if (scansRes.data) state.scans = scansRes.data;
    if (traysRes.data) state.trays = traysRes.data;
    
    if (settingsRes.data) {
      const eng = settingsRes.data.find(s => s.key === 'engine');
      const gk = settingsRes.data.find(s => s.key === 'geminiKey');
      if (eng) state.engine = eng.value;
      if (gk) state.geminiKey = gk.value;
    }

    updateTrayCounters();
    useSupabase = true;
    stateLoaded = true;
    setupRealtime();
    render();
  } catch (err) {
    console.warn("Supabase fetch failed, falling back to localStorage:", err);
    state = loadLocalState();
    useSupabase = false;
    stateLoaded = true;
    render();
    setTimeout(() => showToast(`Supabase Error: ${err.message}. Using Offline Mode.`, "#ff4444"), 1000);
  }
}

function getProjectStickCount(projectId) {
  const trays = state.trays.filter(t => t.projectId == projectId);
  return trays.reduce((sum, t) => sum + (t.sticks?.length || 0), 0);
}

function updateTrayCounters() {
  state.trayCounters = {};
  const trayMap = {};
  const mergedTrays = [];
  let changed = false;
  
  // 1. Clean and normalize tray numbers
  for (const t of state.trays) {
    if (!t) continue;
    let num = parseInt(t.trayNum, 10);
    if (isNaN(num)) num = 0;
    t.trayNum = num;

    const project = state.projects.find(p => p.id == t.projectId);
    if (!project) continue;

    const key = (project.mode === 'separate') 
      ? `${t.projectId}_${t.ownerUserId || t.createdBy}_${t.trayNum}`
      : `${t.projectId}_${t.trayNum}`;
    
    if (!trayMap[key] || t.trayNum === 0) {
      if (t.trayNum !== 0) trayMap[key] = t;
      mergedTrays.push(t);
    } else {
      const survivingTray = trayMap[key];
      const removedTrayId = t.id;
      
      console.log(`Merging Tray #${t.trayNum} (${removedTrayId} -> ${survivingTray.id})`);
      
      // Merge sticks
      const allSticks = [...(survivingTray.sticks || []), ...(t.sticks || [])];
      survivingTray.sticks = [...new Set(allSticks)];
      
      // Update ALL scan references (including those not yet in state.scans if any)
      state.scans.forEach(s => {
        if (s.trayId === removedTrayId) s.trayId = survivingTray.id;
      });
      
      // Update session references to prevent UI flicker/errors
      if (session.lastScan && session.lastScan.trayId === removedTrayId) {
        session.lastScan.trayId = survivingTray.id;
      }
      
      if (useSupabase && sb) {
        sb.from('scans').update({ trayId: survivingTray.id }).eq('trayId', removedTrayId).then();
        sb.from('trays').update({ sticks: survivingTray.sticks }).eq('id', survivingTray.id).then();
        sb.from('trays').delete().eq('id', removedTrayId).then();
      }
      changed = true;
    }
    
    // Track max tray number for each project
    if (t.trayNum > 0) {
      const current = parseInt(state.trayCounters[t.projectId], 10) || 0;
      state.trayCounters[t.projectId] = Math.max(current, t.trayNum);
    }
  }
  
  // Protective check: never delete the tray that was JUST scanned in this session
  if (changed && session.lastScan) {
    const activeTrayId = session.lastScan.trayId;
    const stillExists = mergedTrays.some(mt => mt.id === activeTrayId);
    if (!stillExists) {
      // Find it in the original list and put it back to prevent "undefined" state
      const activeTray = state.trays.find(at => at.id === activeTrayId);
      if (activeTray) mergedTrays.push(activeTray);
    }
  }
  
  if (changed) {
    state.trays = mergedTrays.filter(Boolean);
    saveLocalState();
  }
}

function setupRealtime() {
  if (!sb) return;
  
  const channel = sb.channel('db-changes');
  
  // Safe rendering logic to avoid nuking inputs while typing
  const safeRender = () => {
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) return;
    // Don't re-render if modal is open (user might be editing)
    const modal = document.getElementById('modal');
    if (modal && modal.classList.contains('show')) return;
    render();
  };
  
  channel
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'scans' }, payload => {
      if (!state.scans.find(s => s.id == payload.new.id)) {
        state.scans.unshift(payload.new);
        if (session.page === 'scanner' || session.page === 'history' || session.page === 'master') safeRender();
      }
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'scans' }, payload => {
      state.scans = state.scans.filter(s => s.id != payload.old.id);
      safeRender();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'trays' }, payload => {
      if (!state.trays.find(t => t.id == payload.new.id)) {
        state.trays.push(payload.new);
        updateTrayCounters();
        if (session.page === 'scanner' || session.page === 'trays' || session.page === 'master') safeRender();
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'trays' }, payload => {
      const idx = state.trays.findIndex(t => t.id == payload.new.id);
      if (idx !== -1) {
        state.trays[idx] = payload.new;
        updateTrayCounters();
        if (session.page === 'scanner' || session.page === 'trays' || session.page === 'master') safeRender();
      }
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'trays' }, payload => {
      state.trays = state.trays.filter(t => t.id != payload.old.id);
      updateTrayCounters();
      safeRender();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, payload => {
      if (payload.eventType === 'INSERT') {
        if (!state.projects.find(p => p.id == payload.new.id)) state.projects.push(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const idx = state.projects.findIndex(p => p.id == payload.new.id);
        if (idx !== -1) state.projects[idx] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        state.projects = state.projects.filter(p => p.id != payload.old.id);
      }
      safeRender();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'users' }, payload => {
      if (!state.users.find(u => u.id == payload.new.id)) {
        state.users.push(payload.new);
        if (session.page === 'admin') safeRender();
      }
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        console.log('Realtime connected — live sync active');
      } else if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        console.warn('Realtime disconnected, will retry via periodic sync');
      }
    });
    
  // Periodic full sync + offline queue flush every 30 seconds
  setInterval(() => { fetchDataSilent(); flushOfflineQueue(); }, 30000);
  // Initial flush on connect
  setTimeout(() => flushOfflineQueue(), 3000);
}

    const [projectsRes, scansRes, traysRes, settingsRes] = await Promise.all([

      sb.from('scans').select('*').order('ts', { ascending: false }),

// Helper to save to Supabase OR localStorage with retry
/* ═══ OFFLINE QUEUE — queues failed DB operations for later sync ═══ */
const OFFLINE_QUEUE_KEY = "ddr_offline_queue";
function getOfflineQueue() {
  try { return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || '[]'); } catch { return []; }
}
function saveOfflineQueue(queue) {
  try { localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue)); } catch (e) {}
}
function queueOfflineOp(table, action, data, matchField) {
  const queue = getOfflineQueue();
  queue.push({ table, action, data, matchField, ts: Date.now() });
  saveOfflineQueue(queue);
}
async function flushOfflineQueue() {
  if (!useSupabase || !sb) return;
  const queue = getOfflineQueue();
  if (queue.length === 0) return;
  
  const failed = [];
  for (const op of queue) {
    try {
      let res;
      if (op.action === 'insert') res = await sb.from(op.table).upsert(op.data); // use upsert for safety
      else if (op.action === 'update') res = await sb.from(op.table).update(op.data.updates).eq(op.matchField, op.data.id);
      else if (op.action === 'upsert') res = await sb.from(op.table).upsert(op.data);
      else if (op.action === 'delete') res = await sb.from(op.table).delete().eq(op.matchField, op.data.id);
      if (res && res.error) failed.push(op);
    } catch (e) { failed.push(op); }
  }
  saveOfflineQueue(failed);
  if (queue.length > failed.length) {
    console.log('Offline queue: synced ' + (queue.length - failed.length) + ' ops, ' + failed.length + ' remaining');
    if (failed.length === 0) showToast('Offline changes synced!', '#3ed685');
  }
}

async function dbSave(table, action, data, matchField, retries = 2) {
  if (useSupabase && sb) {
    let success = false;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        let res;
        if (action === 'insert') res = await sb.from(table).insert(data);
        else if (action === 'update') res = await sb.from(table).update(data.updates).eq(matchField, data.id);
        else if (action === 'upsert') res = await sb.from(table).upsert(data);
        else if (action === 'delete') res = await sb.from(table).delete().eq(matchField, data.id);
        
        if (res && res.error) {
          if (action === 'insert' && res.error.code === '23505' && attempt < retries) {
            console.warn('Duplicate key on ' + table + ', retrying as upsert...');
            res = await sb.from(table).upsert(data);
            if (res && !res.error) { success = true; break; }
          }
          if (attempt === retries) {
            console.error('DB ' + action + ' on ' + table + ' failed:', res.error);
          }
        } else {
          success = true;
          break;
        }
      } catch (err) { 
        if (attempt === retries) {
          console.error('DB ' + action + ' failed:', err); 
        }
        await new Promise(r => setTimeout(r, 200 * (attempt + 1)));
      }
    }
    if (!success) {
      queueOfflineOp(table, action, data, matchField);
      showToast("Saved offline — will sync when connected", "#FFD700");
    }
  }
  saveLocalState();
}

/* ════════════════════════════════════════════════════════════════════════
   CLASSIFIER — rule-based + optional Gemini AI
   ════════════════════════════════════════════════════════════════════════ */
function classifyWithRules(scan) {
  if (!scan) return null;
  const s = scan.toUpperCase();

  let partNumber = "";
  if (scan.includes("(P)")) {
    const a = scan.slice(scan.indexOf("(P)") + 3);
    const tags = ["(M)", "(S)", "(L)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    const end = tags.length ? Math.min(...tags) : a.length;
    const pStr = a.slice(0, end).trim();
    const parts = pStr.split(/\s+/);
    partNumber = (parts.length > 1 && parts[0].length <= 3 ? parts[1] : parts[0]) || "";
  } else {
    const clean = scan.replace(/©MLCC/gi, "").replace(/©mlcc/gi, "").trim();
    const parts = clean.split(/\s+/);
    partNumber = (parts.length > 1 && parts[0].length <= 3 ? parts[1] : parts[0]) || "";
  }
  let serial = "";
  if (scan.includes("(S)")) {
    const a = scan.slice(scan.indexOf("(S)") + 3);
    const tags = ["(P)", "(L)", "(M)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    serial = a.slice(0, tags.length ? Math.min(...tags) : a.length).trim();
  }
  let label = "";
  if (scan.includes("(L)")) {
    const a = scan.slice(scan.indexOf("(L)") + 3);
    const tags = ["(S)", "(P)", "(M)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    label = a.slice(0, tags.length ? Math.min(...tags) : a.length).trim();
  }

  const P = partNumber.toUpperCase();

  // ── GENERATION DETECTION (most specific first) ──────────────────────
  let generation = "Unknown";
  // Explicit text match (highest priority)
  if (s.includes("DDR5") || s.includes("PC5-") || s.includes("PC5_")) generation = "DDR5";
  else if (s.includes("DDR4") || s.includes("PC4-") || s.includes("PC4_")) generation = "DDR4";
  else if (s.includes("DDR3") || s.includes("PC3-") || s.includes("PC3_")) generation = "DDR3";
  // SK Hynix generation from prefix
  else if (P.startsWith("HMCG") || P.startsWith("HMCT")) generation = "DDR5";
  else if (P.startsWith("HMT") || P.startsWith("HMN")) generation = "DDR3";
  else if (P.startsWith("HMA") || P.startsWith("HMAA")) generation = "DDR4";
  else if (P.startsWith("HMB")) generation = "DDR5";
  // Samsung module generation from 5th char
  else if (P.startsWith("M471") || P.startsWith("M378") || P.startsWith("M393") || P.startsWith("M386") || P.startsWith("M474") || P.startsWith("M391")) {
    const c = P.substr(4, 1);
    generation = c === "A" ? "DDR4" : c === "B" ? "DDR5" : "DDR3";
  }
  // Samsung component-level chips
  else if (P.startsWith("K4A") || P.startsWith("K4AB")) generation = "DDR4";
  else if (P.startsWith("K4RA") || P.startsWith("K4RB")) generation = "DDR5";
  else if (P.startsWith("K4B") || P.startsWith("K4T")) generation = "DDR3";
  // G.Skill — F4 = DDR4, F5 = DDR5, F3 = DDR3
  else if (P.startsWith("F5-") || P.startsWith("F5U") || P.startsWith("F5S")) generation = "DDR5";
  else if (P.startsWith("F4-") || P.startsWith("F4U")) generation = "DDR4";
  else if (P.startsWith("F3-")) generation = "DDR3";
  // Corsair — X4 = DDR4, X5 = DDR5 (embedded in part number)
  else if (P.includes("X5M") || P.includes("X5N")) generation = "DDR5";
  else if (P.includes("X4M") || P.includes("X4N")) generation = "DDR4";
  // ADATA — AD5 = DDR5, AD4 = DDR4, AD3 = DDR3
  else if (P.startsWith("AD5") || P.startsWith("AX5")) generation = "DDR5";
  else if (P.startsWith("AD4") || P.startsWith("AX4")) generation = "DDR4";
  else if (P.startsWith("AD3") || P.startsWith("AX3")) generation = "DDR3";
  // Nanya — NT5A = DDR4, NT5F = DDR5, NT5C = DDR3
  else if (P.startsWith("NT5F")) generation = "DDR5";
  else if (P.startsWith("NT5A")) generation = "DDR4";
  else if (P.startsWith("NT5C")) generation = "DDR3";
  // Patriot — PSD5/PVV5 = DDR5, PSD4/PVE4 = DDR4
  else if (P.startsWith("PSD5") || P.startsWith("PVV5") || P.startsWith("PSC5")) generation = "DDR5";
  else if (P.startsWith("PSD4") || P.startsWith("PVE4") || P.startsWith("PV4")) generation = "DDR4";
  else if (P.startsWith("PSD3")) generation = "DDR3";
  // TeamGroup — TED5 = DDR5, TED4 = DDR4
  else if (P.startsWith("TED5") || P.startsWith("FF5")) generation = "DDR5";
  else if (P.startsWith("TED4") || P.startsWith("FF4")) generation = "DDR4";
  // Micron — MTA = modules
  else if (P.startsWith("MTC")) generation = "DDR5";
  else if (P.startsWith("MTA")) generation = "DDR4";
  else if (P.startsWith("MT4") || P.startsWith("MT8") || P.startsWith("MT16") || P.startsWith("MT18") || P.startsWith("MT36") || P.startsWith("MT9")) {
    // Micron module — use speed suffix or fallback
    if (s.includes("2G3") || s.includes("2G6") || s.includes("2G9") || s.includes("3G2")) generation = "DDR4";
    else if (s.includes("4G") || s.includes("5G") || s.includes("6G")) generation = "DDR5";
  }

  // ── BRAND DETECTION (most specific first) ───────────────────────────
  let brand = "Unknown";
  
  // 1. Explicit brand name in scan text
  if (s.includes("SAMSUNG")) brand = "Samsung";
  else if (s.includes("HYNIX") || s.includes("SK HYNIX")) brand = "SK Hynix";
  else if (s.includes("MICRON")) brand = "Micron";
  else if (s.includes("CRUCIAL")) brand = "Crucial";
  else if (s.includes("KINGSTON") || s.includes("KING STON")) brand = "Kingston";
  else if (s.includes("CORSAIR")) brand = "Corsair";
  else if (s.includes("G.SKILL") || s.includes("GSKILL") || s.includes("G SKILL")) brand = "G.Skill";
  else if (s.includes("ADATA") || s.includes("A-DATA")) brand = "ADATA";
  else if (s.includes("PATRIOT")) brand = "Patriot";
  else if (s.includes("TEAMGROUP") || s.includes("TEAM GROUP") || s.includes("T-FORCE")) brand = "TeamGroup";
  else if (s.includes("TRANSCEND")) brand = "Transcend";
  else if (s.includes("NANYA")) brand = "Nanya";
  else if (s.includes("RAMAXEL")) brand = "Ramaxel";
  else if (s.includes("MUSHKIN")) brand = "Mushkin";
  else if (s.includes("APACER")) brand = "Apacer";
  else if (s.includes("INNODISK")) brand = "Innodisk";
  else if (s.includes("SMART MODULAR") || (s.includes("SMART") && s.includes("DDR"))) brand = "Smart";
  else if (s.includes("PNY")) brand = "PNY";
  else if (s.includes("AVANT")) brand = "Avant";
  
  // 2. Part number prefix detection
  else {
    // Samsung — M3xx, M4xx, K4xx module/chip prefixes
    if (P.startsWith("M378") || P.startsWith("M471") || P.startsWith("M393") || P.startsWith("M386") || P.startsWith("M474") || P.startsWith("M391") || P.startsWith("M395") || P.startsWith("K4A") || P.startsWith("K4B") || P.startsWith("K4R") || P.startsWith("K4T") || P.startsWith("K4E") || P.startsWith("K4AB") || P.startsWith("K4RA") || P.startsWith("K4RB")) brand = "Samsung";
    // SK Hynix — HMT/HMA/HMB/HMCG/HX
    else if (P.startsWith("HMT") || P.startsWith("HMA") || P.startsWith("HMB") || P.startsWith("HMCG") || P.startsWith("HMCT") || P.startsWith("HMAA") || P.startsWith("HMN") || P.startsWith("H5") || P.startsWith("HX")) brand = "SK Hynix";
    // Micron — MT/MTA/MTC
    else if (P.startsWith("MT") && !P.startsWith("MTE")) brand = "Micron";
    // Crucial — CT
    else if (P.startsWith("CT") && !P.startsWith("CTX")) brand = "Crucial";
    // Kingston — KVR (ValueRAM), KSM (Server Premier), KF (FURY), 99xx (legacy)
    // Kingston OEM — ACR (Acer), ASU (ASUS), HP, AM, DELL, LNV (Lenovo)
    else if (P.startsWith("KVR") || P.startsWith("KSM") || P.startsWith("KF3") || P.startsWith("KF4") || P.startsWith("KF5") || P.startsWith("KTH") || P.startsWith("KTD") || P.startsWith("KTL") || P.startsWith("KTW") || P.startsWith("KN") || P.startsWith("KCP") || P.startsWith("99U") || P.startsWith("99P") || P.startsWith("9905") || P.startsWith("9965") || P.startsWith("ACR") || P.startsWith("ASU") || P.startsWith("AM")) brand = "Kingston";
    // Corsair — CM (Corsair Memory)
    else if (P.startsWith("CM")) brand = "Corsair";
    // G.Skill — F3/F4/F5
    else if (P.startsWith("F3-") || P.startsWith("F4-") || P.startsWith("F5-") || P.startsWith("F3U") || P.startsWith("F4U") || P.startsWith("F5U") || P.startsWith("F4S") || P.startsWith("F5S")) brand = "G.Skill";
    // ADATA — AD/AX
    else if (P.startsWith("AD") || P.startsWith("AX3") || P.startsWith("AX4") || P.startsWith("AX5")) brand = "ADATA";
    // Patriot — PSD, PV, PVV, PSC, PSP
    else if (P.startsWith("PSD") || P.startsWith("PV") || P.startsWith("PSC") || P.startsWith("PSP") || P.startsWith("PVE")) brand = "Patriot";
    // TeamGroup — TED, TTZD, FF, TF
    else if (P.startsWith("TED") || P.startsWith("TTZD") || P.startsWith("FF3") || P.startsWith("FF4") || P.startsWith("FF5") || P.startsWith("TF")) brand = "TeamGroup";
    // PNY — MD
    else if (P.startsWith("MD") && (P.includes("GSD") || P.includes("GD"))) brand = "PNY";
    // Transcend — TS, JM (JetRam)
    else if (P.startsWith("TS") && P.length > 6) brand = "Transcend";
    else if (P.startsWith("JM") && P.length > 6) brand = "Transcend";
    // Nanya — NT
    else if (P.startsWith("NT5") || P.startsWith("NT8") || P.startsWith("NT4")) brand = "Nanya";
    // Ramaxel — RMT, RMR, RMSA, RMN
    else if (P.startsWith("RMT") || P.startsWith("RMR") || P.startsWith("RMSA") || P.startsWith("RMN")) brand = "Ramaxel";
    // Mushkin — ME, MBB, MRB, MSK
    else if (P.startsWith("MES") || P.startsWith("MBB") || P.startsWith("MRB") || P.startsWith("MSK") || P.startsWith("MEB") || P.startsWith("MAR")) brand = "Mushkin";
    // Apacer — 78. or AP prefix
    else if (P.startsWith("78.") || P.startsWith("AP") || P.startsWith("AU") || P.startsWith("AS") && P.length > 8) brand = "Apacer";
    // Smart Modular — SH, SP, SG
    else if (P.startsWith("SH") || P.startsWith("SP4") || P.startsWith("SG") || P.startsWith("SGN")) brand = "Smart";
    // Innodisk — M4S, M4C, M3S
    else if (P.startsWith("M4S") || P.startsWith("M4C") || P.startsWith("M3S") || P.startsWith("M3C")) brand = "Innodisk";
  }

  let confidence = 0.5;
  if (brand !== "Unknown" && generation !== "Unknown") confidence = 0.95;
  else if (brand !== "Unknown") confidence = 0.8;
  else if (generation !== "Unknown") confidence = 0.7;

  return { brand, generation, partNumber, serial, label, confidence, method: "rule" };
}

const CLASSIFIER_PROMPT = `You are a DDR memory module identification expert. Analyze QR scan strings.
GENERATION: DDR5 only if "DDR5"/"PC5-" present. DDR4 if "DDR4"/"PC4-". DDR3 if "DDR3"/"PC3-". HMT→DDR3, HMA→DDR4, HMB→DDR5. M471/M378/M393: A=DDR4, B=DDR5, else DDR3.
BRAND: Samsung, SK Hynix, Micron, Crucial, Kingston, or Unknown.
EXTRACT: Serial between (S) and next tag. Part between (P) and next tag. Label between (L) and next tag.
NEVER guess. DDR5 only if explicit. Output ONLY this JSON:
{"brand":"...","generation":"...","partNumber":"...","serial":"...","label":"...","confidence":0.95}`;

async function classifyWithGemini(scan, apiKey) {
  if (!apiKey) return null;
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: CLASSIFIER_PROMPT }] },
        contents: [{ parts: [{ text: `SCAN: ${scan}` }] }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 300 },
      }),
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const cleaned = text.replace(/```json|```/g, "").trim();
    return { ...JSON.parse(cleaned), method: "gemini" };
  } catch { return null; }
}

async function classify(scan) {
  if (state.engine === "gemini" && state.geminiKey) {
    const r = await classifyWithGemini(scan, state.geminiKey);
    if (r && r.confidence >= 0.75) return r;
    const fb = classifyWithRules(scan);
    return fb ? { ...fb, method: "rule_fallback" } : null;
  }
  return classifyWithRules(scan);
}

/* ════════════════════════════════════════════════════════════════════════
   SCAN RESOLVER — finds scan in local state, Supabase, or synthesizes one
   ════════════════════════════════════════════════════════════════════════ */
async function resolveScan(scanId, tray) {
  // 1. Check local state
  let scan = state.scans.find(s => s.id == scanId);
  if (scan) return scan;
  
  // 2. Try Supabase
  if (useSupabase && sb) {
    try {
      const { data, error } = await sb.from('scans').select('*').eq('id', scanId).single();
      if (!error && data) {
        state.scans.push(data); // cache locally
        return data;
      }
    } catch (e) { console.warn("resolveScan DB lookup failed:", e); }
  }
  
  // 3. Synthesize from tray data — scan record is truly gone but stick reference exists
  const synth = {
    id: scanId,
    projectId: tray.projectId,
    userId: tray.createdBy || session.currentUser?.id,
    ts: tray.createdAt || Date.now(),
    scan: tray.partNumber || "",
    result: {
      partNumber: tray.partNumber || "UNKNOWN",
      serial: "",
      brand: tray.brand || "Unknown",
      generation: tray.generation || "Unknown",
      label: tray.label || "",
      confidence: 1,
      method: "reconstructed"
    },
    trayId: tray.id,
    _synthetic: true
  };
  state.scans.push(synth);
  // Persist to DB so future edits/moves on this stick work across sessions
  await dbSave('scans', 'upsert', synth);
  return synth;
}


const _scanLocks = new Map(); // projectId -> Promise chain
function withScanLock(projectId, fn) {
  const prev = _scanLocks.get(projectId) || Promise.resolve();
  const next = prev.then(fn, fn); // run serially even if prev rejects
  _scanLocks.set(projectId, next);
  return next;
}

function generateId(prefix) {
  // Crypto-random unique ID — no collisions even at 1000+ concurrent users
  const ts = Date.now().toString(36);
  const rand = crypto.getRandomValues(new Uint8Array(8));
  const hex = Array.from(rand).map(b => b.toString(16).padStart(2, '0')).join('');
  return `${prefix}_${ts}_${hex}`;
}

/* ════════════════════════════════════════════════════════════════════════
   TRAY ASSIGNMENT — fast local-first, sync later
   ════════════════════════════════════════════════════════════════════════ */
function getNextTrayNum(projectId) {
  // Always verify against the actual trays list to prevent duplicates
  const trays = state.trays.filter(t => t.projectId == projectId);
  const liveMax = trays.length > 0 ? Math.max(...trays.map(t => parseInt(t.trayNum, 10) || 0)) : 0;
  
  // Use the larger of the cached counter or live max, ensuring we never return NaN
  const cached = parseInt(state.trayCounters[projectId], 10) || 0;
  const currentMax = Math.max(cached, liveMax);
  state.trayCounters[projectId] = currentMax;
  return currentMax + 1;
}

function assignTray(projectId, userId, classification) {
  if (!classification?.partNumber) return null;
  const project = state.projects.find(p => p.id == projectId);
  if (!project) return null;

  const part = classification.partNumber.toUpperCase();
  const candidates = state.trays.filter(t => {
    if (t.projectId != projectId) return false;
    if ((t.partNumber || '').toUpperCase() != part) return false;
    if (project.mode === "separate" && t.ownerUserId != userId) return false;
    return true;
  });

  const sorted = [...candidates].sort((a, b) => b.createdAt - a.createdAt);
  const open = sorted.find(t => (t.sticks?.length || 0) < t.capacity);
  if (open) return { tray: open, status: "ADDED" };

  // Create new tray
  const newNum = getNextTrayNum(projectId);
  const newTray = {
    id: generateId('t'),
    projectId,
    ownerUserId: project.mode === "separate" ? userId : null,
    partNumber: classification.partNumber,
    label: classification.label || "",
    brand: classification.brand || "Unknown",
    generation: classification.generation || "Unknown",
    trayNum: newNum,
    capacity: project.defaultCap,
    sticks: [],
    createdAt: Date.now(),
    createdBy: userId,
    projectName: project.name,
  };
  return { tray: newTray, status: candidates.length > 0 ? "OVERFLOW" : "NEW", isNew: true, newNum };
}

async function doAuth() {
  const username = document.getElementById("auth-user").value.trim();
  const password = document.getElementById("auth-pass").value;
  const msgEl = document.getElementById("auth-msg");
  msgEl.innerHTML = "";

  if (!username || !password) {
    msgEl.innerHTML = `<div class="alert alert-error">Enter username and password</div>`;
    return;
  }

  if (session.authView === "register") {
    if (state.users.find(u => u.username === username)) {
      msgEl.innerHTML = `<div class="alert alert-error">Username taken</div>`;
      return;
    }
    if (password.length < 4) {
      msgEl.innerHTML = `<div class="alert alert-error">Password must be ≥ 4 characters</div>`;
      return;
    }
    const newUser = {
      id: generateId('u'),
      username, password, role: "scanner", name: username,
      color: `hsl(${Math.floor(Math.random()*360)}, 70%, 50%)`,
    };
    state.users.push(newUser);
    await dbSave('users', 'insert', newUser);
    session.authView = "login";
    render();
    setTimeout(() => {
      const m = document.getElementById("auth-msg");
      if (m) m.innerHTML = `<div class="alert alert-success">Account created. Sign in.</div>`;
    }, 50);
    return;
  }

  const user = state.users.find(u => u.username === username && u.password === password);
  if (!user) {
    msgEl.innerHTML = `<div class="alert alert-error">Invalid credentials</div>`;
    return;
  }
  session.currentUser = user;
  session.currentProjectId = null;
  render();
}

/* ═══ UNDO LAST SCAN ═══ */
async function undoLastScan() {
  const lastScan = session.lastScan;
  if (!lastScan) { showToast("Nothing to undo", "#888"); return; }
  
  const tray = state.trays.find(t => t.id == lastScan.trayId);
  if (!tray) { showToast("Tray not found", "#ff6b8a"); return; }
  
  // Remove stick from tray
  const idx = tray.sticks.indexOf(lastScan.id);
  if (idx !== -1) {
    tray.sticks.splice(idx, 1);
    await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
  }
  
  // Remove scan record
  state.scans = state.scans.filter(s => s.id !== lastScan.id);
  if (useSupabase && sb) {
    try { await sb.from('scans').delete().eq('id', lastScan.id); } catch (e) {}
  }
  
  // If the tray was just created and is now empty, delete it
  if (session.lastAssignment?.isNew && tray.sticks.length === 0) {
    state.trays = state.trays.filter(t => t.id !== tray.id);
    if (useSupabase && sb) {
      try { await sb.from('trays').delete().eq('id', tray.id); } catch (e) {}
    }
  }
  
  saveLocalState();
  session.lastScan = null;
  session.lastAssignment = null;
  session.lastDuplicateWarning = null;
  showToast("↩ Last scan undone", "#ff6b8a");
  renderScanner();
}

/* ═══ DUPLICATE SERIAL DETECTION ═══ */
function checkDuplicateSerial(serial, projectId, currentScanId) {
  if (!serial || serial.trim() === '' || serial === '-') return null;
  const normalizedSerial = serial.trim().toUpperCase();
  for (const scan of state.scans) {
    if (scan.id === currentScanId) continue;
    if (scan.projectId !== projectId) continue;
    const scanSerial = (scan.result?.serial || '').trim().toUpperCase();
    if (scanSerial && scanSerial === normalizedSerial) {
      const tray = state.trays.find(t => t.id == scan.trayId);
      return { scanId: scan.id, trayId: scan.trayId, trayNum: tray?.trayNum || '?' };
    }
  }
  return null;
}

/* ═══ PER-USER CSV EXPORT ═══ */
function exportUserReport(userId) {
  const user = state.users.find(u => u.id == userId);
  if (!user) return;
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const userScans = state.scans.filter(s => s.projectId == project.id && s.userId == userId);
  
  const headers = ['Timestamp', 'Part Number', 'Serial', 'Brand', 'Generation', 'Tray #', 'Raw Scan'];
  const rows = userScans.map(s => {
    const tray = state.trays.find(t => t.id == s.trayId);
    return [
      new Date(s.ts).toISOString(),
      s.result?.partNumber || '',
      s.result?.serial || '',
      s.result?.brand || '',
      s.result?.generation || '',
      tray?.trayNum || '',
      s.scan || ''
    ].map(v => '"' + String(v).replace(/"/g, '""') + '"');
  });
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = user.name.replace(/\s+/g, '_') + '_scans_' + project.name.replace(/\s+/g, '_') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded ' + userScans.length + ' scans for ' + user.name, '#3ed685');
}

async function doBulkScan() {
  const input = document.getElementById("scan-input");
  const btn = document.getElementById("scan-btn");
  const lines = input.value.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) { showToast('Paste scan data (one per line)', '#ff6b8a'); return; }
  
  btn.textContent = `Processing 0/${lines.length}...`;
  btn.disabled = true;
  window.isBulkScanning = true;
  let success = 0;
  const dbOps = []; // queue DB writes for background
  
  for (let i = 0; i < lines.length; i++) {
    btn.textContent = `Processing ${i+1}/${lines.length}...`;
    const scan = lines[i];
    const result = await classify(scan);
    if (!result || !result.partNumber) continue;
    
    const assignment = assignTray(session.currentProjectId, session.currentUser.id, result);
    if (!assignment) continue;
    
    const scanId = generateId('s');
    const newScan = {
      id: scanId, projectId: session.currentProjectId, userId: session.currentUser.id,
      ts: Date.now() + i, scan, result, trayId: assignment.tray.id,
    };
    if (assignment.isNew) {
      assignment.tray.sticks = [scanId];
      state.trays.push(assignment.tray);
      state.trayCounters[session.currentProjectId] = assignment.newNum;
      dbOps.push({ table: 'trays', action: 'insert', data: assignment.tray });
    } else {
      assignment.tray.sticks.push(scanId);
      dbOps.push({ table: 'trays', action: 'update', data: { updates: { sticks: assignment.tray.sticks }, id: assignment.tray.id }, matchField: 'id' });
    }
    state.scans.unshift(newScan);
    dbOps.push({ table: 'scans', action: 'insert', data: newScan });
    
    session.lastScan = newScan;
    session.lastAssignment = assignment;
    success++;
    
    // Yield to UI every 10 items
    if (i % 10 === 9) await new Promise(r => setTimeout(r, 10));
  }
  
  saveLocalState();
  window.isBulkScanning = false;
  btn.textContent = 'Scan All \u25b6';
  btn.disabled = false;
  input.value = '';
  showToast(`\u2713 Bulk scan: ${success}/${lines.length} processed`, '#3ed685');
  renderScanner();
  
  // Fire all DB writes in background
  (async () => {
    for (const op of dbOps) {
      await dbSave(op.table, op.action, op.data, op.matchField);
    }
  })();
}

async function doScan() {
  const input = document.getElementById("scan-input");
  const btn = document.getElementById("scan-btn");
  let scan = input.value.trim();
  
  if (scanMode === 'dual') {
    const serialInput = document.getElementById("serial-input");
    const partScan = scan;
    const serialScan = serialInput ? serialInput.value.trim() : '';
    if (!partScan) { showToast("Enter the Part Number scan", "#ff6b8a"); return; }
    scan = `(P)${partScan}`;
    if (serialScan) scan += ` (S)${serialScan}`;
  }
  
  if (!scan) return;
  btn.textContent = "Analyzing…";
  btn.disabled = true;
  
  try {
    const result = await classify(scan);
    if (!result) {
      showToast("Classification failed", "#ff6b8a");
      btn.textContent = "Scan ▶"; btn.disabled = false;
      return;
    }
    
    // --- LOCAL-FIRST: all state changes happen instantly ---
    const assignment = assignTray(session.currentProjectId, session.currentUser.id, result);
    if (!assignment) {
      showToast("No part number — cannot assign tray", "#ff6b8a");
      btn.textContent = "Scan ▶"; btn.disabled = false;
      return;
    }
    
    const scanId = generateId('s');
    const newScan = {
      id: scanId, projectId: session.currentProjectId, userId: session.currentUser.id,
      ts: Date.now(), scan, result, trayId: assignment.tray.id,
    };
    
    let trayRef;
    if (assignment.isNew) {
      assignment.tray.sticks = [scanId];
      state.trays.push(assignment.tray);
      state.trayCounters[session.currentProjectId] = assignment.newNum;
      trayRef = assignment.tray;
    } else {
      trayRef = assignment.tray;
      trayRef.sticks.push(scanId);
    }
    state.scans.unshift(newScan);
    saveLocalState(); // instant local persist
    
    input.value = "";
    
    session.lastScan = newScan;
    session.lastAssignment = assignment;
    
    // Duplicate serial check (local, instant)
    session.lastDuplicateWarning = null;
    if (result.serial) {
      const dupe = checkDuplicateSerial(result.serial, session.currentProjectId, scanId);
      if (dupe) session.lastDuplicateWarning = { existingTrayNum: dupe.trayNum };
    }
    
    const trayN = trayRef.trayNum;
    if (assignment.status === "NEW") showToast(`✓ NEW PART → Tray #${trayN}`, "#3ed685");
    else if (assignment.status === "OVERFLOW") showToast(`⊕ OVERFLOW → New Tray #${trayN}`, "#4fa3ff");
    else showToast(`✓ Added to Tray #${trayN}`, "#FFD700");
    
    renderResultCard(newScan.result, trayRef);
    
    // --- INSTANT: Show label immediately if needed ---
    const project = state.projects.find(p => p.id == session.currentProjectId);
    if (assignment.isNew && project?.autoprint) {
      printTrayLabel(trayRef);
    }
    
    // --- BACKGROUND: fire DB writes without blocking the UI ---
    (async () => {
      try {
        if (assignment.isNew) {
          await dbSave('trays', 'insert', trayRef);
        } else {
          await dbSave('trays', 'update', { updates: { sticks: trayRef.sticks }, id: trayRef.id }, 'id');
        }
        await dbSave('scans', 'insert', newScan);
      } catch (err) {
        console.error("Background DB save error:", err);
      }
    })();
    
  } catch (err) {
    console.error("Scan error:", err);
    showToast("Scan failed: " + err.message, "#ff6b8a");
  }
  
  btn.textContent = "Scan ▶"; btn.disabled = false;
  renderScanner();
}

async function undoLastScan() {
  if (!session.lastScan) return;
  const lastScanId = session.lastScan.id;
  const lastTrayId = session.lastScan.trayId;
  const isNewTray = session.lastAssignment?.isNew;
  
  // Clear session refs immediately to prevent double-undo
  session.lastScan = null;
  session.lastAssignment = null;
  
  showToast("Undoing last scan...", "#FFD700");
  
  // 1. Remove from local state
  state.scans = state.scans.filter(s => s.id !== lastScanId);
  
  // 2. Remove from tray sticks
  const tray = state.trays.find(t => t.id === lastTrayId);
  if (tray) {
    tray.sticks = (tray.sticks || []).filter(id => id !== lastScanId);
  }
  
  // 3. Delete from DB in background
  if (useSupabase && sb) {
    // If it was the only stick, the tray might need deletion (handled by sync normally, but we can be proactive)
    if (tray && tray.sticks.length === 0) {
       // We'll let the background sync handle cleanup to keep it simple and fast
    }
    sb.from('trays').update({ sticks: tray?.sticks || [] }).eq('id', lastTrayId).then();
    sb.from('scans').delete().eq('id', lastScanId).then();
  }
  
  saveLocalState();
  renderScanner();
}

async function deleteTray(trayId) {
  const tray = state.trays.find(t => t.id == trayId);
  if (!tray) return;
  const removedScanIds = new Set(tray.sticks);
  state.scans = state.scans.filter(s => !removedScanIds.has(s.id));
  state.trays = state.trays.filter(t => t.id != trayId);
  if (useSupabase && sb) {
    try {
      if (removedScanIds.size > 0) await sb.from('scans').delete().in('id', [...removedScanIds]);
      await sb.from('trays').delete().eq('id', trayId);
    } catch (err) { console.warn('Delete tray DB error:', err); }
  }
  saveLocalState();
  hideModal();
  showToast(`Tray #${tray.trayNum} deleted`, '#ff6b8a');
  renderTraysPage();
}

async function doEditStick(trayId, stickIndex) {
  const tray = state.trays.find(t => t.id == trayId);
  if (!tray || !tray.sticks[stickIndex]) return;
  const scanId = tray.sticks[stickIndex];
  const scan = await resolveScan(scanId, tray);
  if (!scan) return;
  
  const newPart = (document.getElementById("edit-stick-part")?.value || "").trim();
  const newSerial = (document.getElementById("edit-stick-serial")?.value || "").trim();
  const msgEl = document.getElementById("edit-stick-msg");
  
  if (!newPart) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Part number is required</div>';
    return;
  }
  
  const partChanged = newPart.toUpperCase() !== (scan.result?.partNumber || "").toUpperCase();
  
  // Update the scan result
  scan.result.partNumber = newPart.toUpperCase();
  scan.result.serial = newSerial;
  await dbSave('scans', 'update', { updates: { result: scan.result }, id: scan.id }, 'id');
  
  if (partChanged) {
    // Part number changed — need to reassign tray
    await withScanLock(session.currentProjectId, async () => {
      const assignment = await assignTray(session.currentProjectId, session.currentUser.id, scan.result);
      if (!assignment) { 
        hideModal();
        showToast("Updated scan but could not reassign tray", "#FFD700");
        renderTraysPage(); 
        return; 
      }
      
      // If reassigned to the same tray, no move needed
      if (assignment.tray.id === tray.id) {
        hideModal();
        showToast("Stick updated (same tray)", '#3ed685');
        renderTraysPage();
        return;
      }
      
      // Remove from current tray
      tray.sticks.splice(stickIndex, 1);
      await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
      
      if (assignment.isNew) {
        assignment.tray.sticks = [scanId];
        state.trays.push(assignment.tray);
        state.trayCounters[session.currentProjectId] = assignment.newNum;
        await dbSave('trays', 'insert', assignment.tray);
      } else {
        const targetTray = assignment.tray;
        targetTray.sticks.push(scanId);
        await dbSave('trays', 'update', { updates: { sticks: targetTray.sticks }, id: targetTray.id }, 'id');
      }
      scan.trayId = assignment.tray.id;
      await dbSave('scans', 'update', { updates: { trayId: assignment.tray.id }, id: scan.id }, 'id');
      
      hideModal();
      showToast(`Stick updated & moved to Tray #${assignment.tray.trayNum || assignment.newNum}`, '#3ed685');
      renderTraysPage();
    });
  } else {
    hideModal();
    showToast("Stick updated", '#3ed685');
    renderTraysPage();
  }
}

async function doMergeTray(sourceTrayId) {
  const sourceTray = state.trays.find(t => t.id == sourceTrayId);
  if (!sourceTray) return;
  
  const numStr = document.getElementById("merge-target-num")?.value;
  const msgEl = document.getElementById("merge-msg");
  if (!numStr) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Enter a target tray number</div>';
    return;
  }
  const num = parseInt(numStr, 10);
  if (isNaN(num) || num < 1) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Invalid tray number</div>';
    return;
  }
  
  const project = state.projects.find(p => p.id == sourceTray.projectId);
  const targetTray = state.trays.find(t => t.projectId == sourceTray.projectId && t.trayNum == num && (project.mode != 'separate' || t.ownerUserId == sourceTray.ownerUserId));
  
  if (!targetTray) {
    if (msgEl) msgEl.innerHTML = `<div class="alert alert-error">Tray #${num} not found in this project</div>`;
    return;
  }
  if (targetTray.id == sourceTray.id) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Cannot merge a tray into itself</div>';
    return;
  }
  
  hideModal();
  showToast("Merging trays...", "#FFD700");
  
  // Move all stick references
  const uniqueSticks = [...new Set([...targetTray.sticks, ...sourceTray.sticks])];
  targetTray.sticks = uniqueSticks;
  
  // Update all scans to point to new tray
  for (const sId of sourceTray.sticks) {
    const scan = state.scans.find(s => s.id == sId);
    if (scan) {
      scan.trayId = targetTray.id;
      await dbSave('scans', 'update', { updates: { trayId: targetTray.id }, id: scan.id }, 'id');
    }
  }
  
  // Save target tray state
  await dbSave('trays', 'update', { updates: { sticks: targetTray.sticks }, id: targetTray.id }, 'id');
  
  // Remove source tray
  state.trays = state.trays.filter(t => t.id != sourceTray.id);
  await dbSave('trays', 'delete', { id: sourceTray.id }, 'id');
  
  showToast(`Successfully merged into Tray #${targetTray.trayNum}`, "#3ed685");
  renderTraysPage();
}

async function doMoveStick(trayId, stickIndex) {
  const tray = state.trays.find(t => t.id == trayId);
  if (!tray || !tray.sticks[stickIndex]) return;
  const scanId = tray.sticks[stickIndex];
  const scan = await resolveScan(scanId, tray);
  if (!scan) return;
  
  const newTrayNumStr = document.getElementById("move-stick-tray")?.value;
  const msgEl = document.getElementById("move-stick-msg");
  if (!newTrayNumStr) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Enter a tray number</div>';
    return;
  }
  const newTrayNum = parseInt(newTrayNumStr, 10);
  if (isNaN(newTrayNum) || newTrayNum < 1) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Invalid tray number</div>';
    return;
  }
  if (newTrayNum === tray.trayNum) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Stick is already in this tray</div>';
    return;
  }
  
  await withScanLock(session.currentProjectId, async () => {
    const project = state.projects.find(p => p.id == session.currentProjectId);
    let targetTray = state.trays.find(t => t.projectId == project.id && t.trayNum == newTrayNum);
    
    if (targetTray) {
      if (targetTray.sticks.length >= targetTray.capacity) {
        if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Target tray is full</div>';
        return;
      }
      // Warn if different part number
      const stickPart = (scan.result?.partNumber || "").toUpperCase();
      const trayPart = (targetTray.partNumber || "").toUpperCase();
      if (stickPart && trayPart && stickPart !== trayPart) {
        if (msgEl && !msgEl.dataset.confirmed) {
          msgEl.innerHTML = `<div style="background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 0.5rem;">
            <div style="color: #FFD700; font-weight: 700; font-size: 0.85rem; margin-bottom: 0.25rem;">⚠ Part number mismatch</div>
            <div style="color: #ccc; font-size: 0.8rem;">Stick: <b>${escapeHtml(stickPart)}</b> → Tray: <b>${escapeHtml(trayPart)}</b></div>
            <button onclick="document.getElementById('move-stick-msg').dataset.confirmed='1'; doMoveStick('${trayId}', ${stickIndex});" class="btn" style="margin-top: 0.5rem; font-size: 0.8rem; padding: 0.35rem 1rem; background: #FFD700; color: #0a0a0f;">Move Anyway</button>
          </div>`;
          return;
        }
      }
    } else {
      // Create new tray
      targetTray = {
        id: generateId('t'),
        projectId: project.id, ownerUserId: session.currentUser.id,
        partNumber: scan.result.partNumber, label: scan.result.label || "", 
        brand: scan.result.brand || "Unknown", generation: scan.result.generation || "Unknown",
        trayNum: newTrayNum, capacity: project.defaultCap, sticks: [],
        createdAt: Date.now(), createdBy: session.currentUser.id, projectName: project.name
      };
      state.trays.push(targetTray);
      await dbSave('trays', 'insert', targetTray);
      // Update counter if needed
      if (newTrayNum > (state.trayCounters[project.id] || 0)) {
        state.trayCounters[project.id] = newTrayNum;
      }
    }
    
    // Remove from source
    tray.sticks.splice(stickIndex, 1);
    await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
    
    // Add to target
    targetTray.sticks.push(scan.id);
    await dbSave('trays', 'update', { updates: { sticks: targetTray.sticks }, id: targetTray.id }, 'id');
    
    scan.trayId = targetTray.id;
    await dbSave('scans', 'update', { updates: { trayId: targetTray.id }, id: scan.id }, 'id');
    
    hideModal();
    showToast(`Stick moved to Tray #${newTrayNum}`, '#3ed685');
    renderTraysPage();
  });
}

function exportCSV() {
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const projectScans = state.scans.filter(s => s.projectId == project.id);
  const filtered = historyFilter === "all" ? projectScans : projectScans.filter(s => s.userId == historyFilter);
  const headers = ['Timestamp','Part Number','Serial','Brand','Generation','Tray#','Scanned By','Label'];
  const rows = filtered.map(s => {
    const u = state.users.find(u => u.id == s.userId);
    const tray = state.trays.find(t => t.id == s.trayId);
    return [new Date(s.ts).toLocaleString(), s.result.partNumber||'', s.result.serial||'', s.result.brand||'', s.result.generation||'', tray?.trayNum||'', u?.name||'', s.result.label||'']
      .map(v => `"${String(v).replace(/"/g, '""')}"`);
  });
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name}_history.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!', '#3ed685');
}

let masterFilter = "all";
function setMasterFilter(f) { masterFilter = f; renderMasterPage(); }

function renderMasterPage() {
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const projectTrays = state.trays.filter(t => t.projectId == project.id).sort((a,b) => a.trayNum - b.trayNum);
  const members = state.users.filter(u => project.memberIds.some(id => id == u.id));

  // Brand Distribution
  const brandCounts = {};
  projectTrays.forEach(t => {
    const b = t.brand || 'Unknown';
    brandCounts[b] = (brandCounts[b] || 0) + t.sticks.length;
  });
  const totalSticks = Object.values(brandCounts).reduce((a,b)=>a+b,0);
  const sortedBrands = Object.entries(brandCounts).sort((a,b)=>b[1]-a[1]);

  const distributionBar = sortedBrands.map(([brand, count]) => {
    const meta = BRAND_META[brand] || BRAND_META.Unknown;
    const pct = (count / totalSticks * 100).toFixed(1);
    return `<div style="width: ${pct}%; background: ${meta.hex}; height: 100%;" title="${brand}: ${count}"></div>`;
  }).join('');
  
  const distributionLegend = sortedBrands.map(([brand, count]) => {
    const meta = BRAND_META[brand] || BRAND_META.Unknown;
    return `<div style="display: flex; align-items: center; gap: 4px; font-size: 0.7rem; color: #888;">
      <div style="width: 8px; height: 8px; border-radius: 2px; background: ${meta.hex};"></div>
      <span>${brand}: ${count}</span>
    </div>`;
  }).join('');

  const userCards = members.map(u => {

function exportMasterCSV() {
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const projectTrays = state.trays.filter(t => t.projectId == project.id).sort((a,b) => a.trayNum - b.trayNum);
  const headers = ['Tray#','Part Number','Brand','Generation','Sticks','Capacity','Owner','Date'];
  const rows = projectTrays.map(t => {
    const owner = state.users.find(u => u.id == (t.ownerUserId || t.createdBy));
    return [t.trayNum, t.partNumber, t.brand, t.generation, t.sticks.length, t.capacity, owner?.name||'', new Date(t.createdAt).toLocaleDateString()]
      .map(v => `"${String(v).replace(/"/g, '""')}"`);
  });
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name}_master.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Master CSV downloaded!', '#3ed685');
}

let adminTab = "overview";
function setAdminTab(t) { adminTab = t; renderAdminPage(); }

function renderAdminPage() {
  const project = state.projects.find(p => p.id == session.currentProjectId);
  const projectTrays = state.trays.filter(t => t.projectId == project.id);
  const projectScans = state.scans.filter(s => s.projectId == project.id);
  
  // Per-user stats
  const userStats = {};
  projectScans.forEach(s => {
    if (!userStats[s.userId]) userStats[s.userId] = { count: 0, latest: 0 };
    userStats[s.userId].count++;
    if (s.ts > userStats[s.userId].latest) userStats[s.userId].latest = s.ts;
  });
  
  // Brand breakdown
  const brandCounts = {};
  projectTrays.forEach(t => {
    const b = t.brand || "Unknown";
    if (!brandCounts[b]) brandCounts[b] = { trays: 0, sticks: 0 };
    brandCounts[b].trays++;
    brandCounts[b].sticks += t.sticks?.length || 0;
  });
  
  const tabs = [
    { id: "overview", label: "Overview", icon: "📊" },
    { id: "users", label: "Users", icon: "👤" },
    { id: "members", label: "Members", icon: "🔗" },
    { id: "import", label: "Import", icon: "📄" },
    { id: "danger", label: "Danger", icon: "⚠" },
  ];

  document.getElementById("page-content").innerHTML = `
    <h1 class="h" style="margin-bottom: 0.5rem;">Admin · ${escapeHtml(project.name)}</h1>
    
    <div style="display: flex; gap: 0; margin-bottom: 2rem; border-bottom: 2px solid #1a1a22; overflow-x: auto;">
      ${tabs.map(t => `
        <button onclick="setAdminTab('${t.id}')" style="
          padding: 0.75rem 1.25rem; border: 0; background: transparent;
          color: ${adminTab === t.id ? '#FFD700' : '#666'}; font-weight: 700; font-size: 0.85rem;
          border-bottom: 2px solid ${adminTab === t.id ? '#FFD700' : 'transparent'};

        ">${t.icon} ${t.label}</button>
      `).join('')}
    </div>
    
    <div id="admin-tab-content"></div>
  `;
  
  const container = document.getElementById("admin-tab-content");
  if (adminTab === "overview") renderAdminOverview(container, project, projectTrays, projectScans, userStats, brandCounts);
  else if (adminTab === "users") renderAdminUsers(container);

async function doAddUser() {
  const username = document.getElementById("new-user-username")?.value.trim();
  const name = document.getElementById("new-user-name")?.value.trim() || username;
  const pass = document.getElementById("new-user-pass")?.value;
  const role = document.getElementById("new-user-role")?.value || "scanner";
  const msgEl = document.getElementById("add-user-msg");
  
  if (!username) { if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Username required</div>'; return; }
  if (!pass || pass.length < 4) { if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Password must be at least 4 chars</div>'; return; }
  if (state.users.find(u => u.username === username)) { if (msgEl) msgEl.innerHTML = '<div class="alert alert-error">Username already exists</div>'; return; }
  
  const hue = Math.floor(Math.random() * 360);
  const newUser = {
    id: generateId('u'), username, password: pass, role, name,
    color: 'hsl(' + hue + ', 70%, 50%)',
  };
  state.users.push(newUser);
  await dbSave('users', 'insert', newUser);
  hideModal();
  showToast('User "' + name + '" created', '#3ed685');
  renderAdminPage();
}

async function doEditUser(userId) {
  const u = state.users.find(x => x.id == userId);
  if (!u) return;
  const name = document.getElementById("edit-user-name")?.value.trim();
  const pass = document.getElementById("edit-user-pass")?.value;
  const color = document.getElementById("edit-user-color")?.value;
  
  if (name) u.name = name;
  if (pass && pass.length >= 4) u.password = pass;
  if (color) u.color = color;
  
  await dbSave('users', 'update', { updates: { name: u.name, password: u.password, color: u.color }, id: u.id }, 'id');
  hideModal();
  showToast('User "' + u.name + '" updated', '#3ed685');
  renderAdminPage();
}

async function changeUserRole(userId, newRole) {
  const u = state.users.find(x => x.id == userId);
  if (!u) return;
  u.role = newRole;
  await dbSave('users', 'update', { updates: { role: newRole }, id: u.id }, 'id');
  showToast(u.name + ' is now ' + newRole, '#4fa3ff');

}
