<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDR Tray Scanner</title>
<style>
  /* ─── Reset & base ──────────────────────────────────────────────────── */
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0f;
    color: #e8e8ee;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  
  /* ─── Layout primitives ─────────────────────────────────────────────── */
  .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }
  
  /* ─── Auth ──────────────────────────────────────────────────────────── */
  .auth-card {
    background: #1a1a22;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 22px; color: #1a1a2e;
  }
  .logo-title { font-size: 22px; font-weight: 800; color: #FFD700; letter-spacing: -0.4px; }
  .logo-sub { font-size: 11px; color: #888; letter-spacing: 0.5px; }
  .tabs { display: flex; margin-bottom: 24px; background: #15151c; border-radius: 10px; padding: 4px; }
  .tab { flex: 1; padding: 10px 0; border: 0; background: transparent; color: #888; font-weight: 700; font-size: 12px; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .tab.active { background: #FFD700; color: #1a1a2e; }
  
  /* ─── Form elements ─────────────────────────────────────────────────── */
  .field { margin-bottom: 14px; }
  .label { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%; background: #0a0a0f; border: 1px solid #2a2a35; color: #fff;
    padding: 11px 14px; border-radius: 8px; font-size: 14px; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: #FFD700; }
  textarea { resize: vertical; min-height: 110px; font-family: ui-monospace, monospace; line-height: 1.5; }
  
  /* ─── Buttons ───────────────────────────────────────────────────────── */
  .btn {
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    color: #1a1a2e; border: 0; padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: #888; border: 1px solid #2a2a35;
    padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  }
  .btn-ghost:hover { color: #fff; border-color: #444; }
  .btn-block { width: 100%; }
  
  /* ─── Notifications ─────────────────────────────────────────────────── */
  .alert { padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 8px; }
  .alert-error { background: #3a1520; color: #ff6b8a; }
  .alert-success { background: #0a2818; color: #3ed685; }
  .alert-info { background: #0f2240; color: #4fa3ff; }
  
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1a1a22; padding: 14px 22px; border-radius: 10px;
    font-weight: 700; font-size: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 200; animation: slide-in 0.2s ease-out;
  }
  @keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  
  /* ─── Top bar ───────────────────────────────────────────────────────── */
  .topbar {
    background: #0f0f15; border-bottom: 1px solid #1f1f28;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-inner {
    max-width: 1280px; margin: 0 auto; padding: 12px 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .nav { flex: 1; display: flex; gap: 4px; justify-content: center; }
  .nav button {
    background: transparent; color: #888; font-weight: 700; font-size: 13px;
    padding: 8px 16px; border-radius: 8px; border: 0; letter-spacing: 0.4px;
  }
  .nav button.active { background: #FFD700; color: #1a1a2e; }
  .nav button:hover:not(.active) { color: #fff; }
  
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
  }
  .avatar-sm { width: 24px; height: 24px; font-size: 11px; }
  .avatar-xs { width: 22px; height: 22px; font-size: 10px; border: 2px solid #1a1a22; }
  
  /* ─── Cards & panels ────────────────────────────────────────────────── */
  .card { background: #1a1a22; border-radius: 14px; padding: 20px; }
  .card-tight { padding: 16px; }
  
  /* ─── Project cards ─────────────────────────────────────────────────── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .proj-card {
    text-align: left; border: 0; background: #1a1a22;
    border-radius: 14px; padding: 20px;
    transition: background 0.15s;
  }
  .proj-card:hover { background: #22222d; }
  .proj-card.mixed { border-top: 3px solid #3ed685; }
  .proj-card.separate { border-top: 3px solid #4fa3ff; }
  
  .badge {
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 4px;
  }
  .badge-mixed    { background: #0a2818; color: #3ed685; }
  .badge-separate { background: #0f2240; color: #4fa3ff; }
  .badge-full     { background: #3a1520; color: #ff6b8a; }
  .badge-active   { background: #0a2818; color: #3ed685; }
  
  /* ─── Mode picker ───────────────────────────────────────────────────── */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mode-opt {
    text-align: left; border: 2px solid #2a2a35; background: transparent;
    border-radius: 12px; padding: 14px; transition: all 0.15s;
  }
  .mode-opt.active.mixed { border-color: #3ed685; background: #15151c; }
  .mode-opt.active.separate { border-color: #4fa3ff; background: #15151c; }
  
  /* ─── Tray cards ────────────────────────────────────────────────────── */
  .tray-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .tray-card { background: #1a1a22; border-radius: 12px; padding: 16px; }
  .tray-progress { height: 6px; background: #0a0a0f; border-radius: 3px; overflow: hidden; }
  .tray-progress-fill { height: 100%; transition: width 0.3s; }
  
  /* ─── Brand pills ───────────────────────────────────────────────────── */
  .pill {
    color: #fff; padding: 3px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  }
  .pill-large { padding: 5px 12px; font-size: 12px; }
  
  /* ─── Engine toggle ─────────────────────────────────────────────────── */
  .engine-btn {
    display: flex; align-items: center; gap: 6px;
    background: #15151c; border: 1px solid #2a2a35;
    padding: 6px 10px; border-radius: 8px;
  }
  .engine-dot { width: 6px; height: 6px; border-radius: 50%; }
  .engine-popup {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: #1a1a22; border: 1px solid #2a2a35; border-radius: 12px;
    padding: 8px; width: 280px; z-index: 100;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .engine-opt {
    width: 100%; text-align: left; border: 0; background: transparent;
    padding: 10px 12px; border-radius: 8px; margin-bottom: 2px;
    display: flex; align-items: center; gap: 10px;
  }
  .engine-opt.active { background: #15151c; }
  .engine-opt:hover { background: #15151c; }
  
  /* ─── Modal ─────────────────────────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 300;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: #1a1a22; border-radius: 14px; padding: 24px;
    max-width: 560px; width: 100%; max-height: 85vh; overflow: auto;
  }
  
  /* ─── Empty states ──────────────────────────────────────────────────── */
  .empty { background: #1a1a22; border-radius: 12px; padding: 48px 24px; text-align: center; color: #aaa; }
  
  /* ─── Stats ─────────────────────────────────────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { background: #1a1a22; border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  
  /* ─── Headings ──────────────────────────────────────────────────────── */
  h1.h { font-size: 22px; font-weight: 800; color: #FFD700; letter-spacing: -0.5px; margin: 0 0 16px; }
  h2.h2 { font-size: 16px; font-weight: 700; color: #e8e8ee; letter-spacing: -0.3px; margin: 0; }
  
  /* ─── Tables ────────────────────────────────────────────────────────── */
  .history-row {
    display: grid;
    grid-template-columns: 1fr 1.5fr 0.8fr 0.7fr 0.6fr 0.7fr 0.7fr;
    gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid #15151c; align-items: center;
    font-size: 12px;
  }
  .history-head { background: #15151c; font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  
  /* ─── Print styles for Zebra GK420d ─────────────────────────────────── */
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area {
      position: absolute !important;
      left: 0 !important; top: 0 !important;
      width: 4in !important; height: 1.5in !important;
      page-break-inside: avoid;
    }
    @page { size: 4in 1.5in; margin: 0; }
    body, html { height: auto !important; }
    #root, #modal, #toast-container { display: none !important; }
    #print-area { 
      display: block !important; 
      position: static !important; 
      width: 4in; 
      height: 1.5in; 
      overflow: hidden;
    }
  }
  #print-area { display: none; }
  #print-area.show { display: block; position: absolute; left: -9999px; }
  
  /* ─── Utility ───────────────────────────────────────────────────────── */
  .mono { font-family: ui-monospace, "SF Mono", monospace; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .flex { display: flex; }
  .flex-1 { flex: 1; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  
  @media (max-width: 700px) {
    .topbar-inner { flex-wrap: wrap; }
    .nav { order: 3; width: 100%; flex-wrap: wrap; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .history-row { grid-template-columns: 1fr 1fr; gap: 6px; }
    .history-head { display: none; }
  }
</style>

<script>
"use strict";

/* ════════════════════════════════════════════════════════════════════════
   SUPABASE STATE MANAGEMENT
   ════════════════════════════════════════════════════════════════════════ */
const SUPABASE_URL = atob("aHR0cHM6Ly9zYnRybmZ0bmdzd3hpdnFrc3Nqai5zdXBhYmFzZS5jbw==");
const SUPABASE_KEY = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5OaWRISnVablJ1WjNOM2VHbDJjV3R6YzJwcUlpd2ljbTlzWlNJNklucmxjblpwWTJWZmNtOXNaU0lzSW1saGRDSTZNVGMzT0RBd01UVTVOQ3dpWlhod0lqb3lNRGt6TlRjM05UazBmUS5ydWR4MHZDUHNOWmhQdlRDbVhJcmNTb1ZpT2NHWjZodjA3V1JXcHFwV0lr");

let sb = null; // Supabase client — initialized safely below
try {
  if (window.supabase && window.supabase.createClient) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch (e) { console.warn("Supabase init failed:", e); }

const STORAGE_KEY = "ddr_scanner_v5";
const DEFAULT_STATE = {
  users: [
    { id: "u1", username: "admin",      password: "admin", role: "admin",      name: "Admin",    color: "#FFD700" },
    { id: "u2", username: "mohan",      password: "demo",  role: "scanner",    name: "Mohan C.", color: "#1428A0" },
    { id: "u3", username: "ashu",       password: "demo",  role: "scanner",    name: "Ashu",     color: "#CC0000" },
    { id: "u4", username: "ronny",      password: "demo",  role: "scanner",    name: "Ronny",    color: "#007A33" },
    { id: "u5", username: "supervisor", password: "demo",  role: "supervisor", name: "Lead",     color: "#E65100" },
  ],
  projects: [
    { id: "p1", name: "DDR Sort \u2014 Q4", mode: "mixed",    memberIds: ["u2","u3","u4"], defaultCap: 50,  autoprint: true,  createdBy: "u1", createdAt: Date.now() - 86400000 },
    { id: "p2", name: "Bulk Audit",     mode: "separate", memberIds: ["u2","u5"],     defaultCap: 100, autoprint: true,  createdBy: "u1", createdAt: Date.now() - 3600000  },
  ],
  scans: [], trays: [], trayCounters: {}, engine: "rule", geminiKey: "",
};

let state = {
  users: [], projects: [], scans: [], trays: [], trayCounters: {}, engine: "rule", geminiKey: ""
};
let stateLoaded = false;
let useSupabase = !!sb;

function loadLocalState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    return { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...JSON.parse(raw) };
  } catch { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function saveLocalState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { console.warn("Save failed:", e); }
}

async function initSupabaseState() {
  if (!sb) {
    // Supabase not available — fall back to localStorage
    console.warn("Supabase not available, using localStorage");
    state = loadLocalState();
    useSupabase = false;
    stateLoaded = true;
    render();
    return;
  }
  try {
    const [usersRes, projectsRes, scansRes, traysRes, settingsRes] = await Promise.all([
      sb.from('users').select('*'),
      sb.from('projects').select('*'),
      sb.from('scans').select('*').order('ts', { ascending: false }),
      sb.from('trays').select('*'),
      sb.from('settings').select('*')
    ]);

    // Check for errors
    if (usersRes.error || projectsRes.error) {
      throw new Error(usersRes.error?.message || projectsRes.error?.message || 'Fetch failed');
    }

    if (usersRes.data) state.users = usersRes.data;
    if (projectsRes.data) state.projects = projectsRes.data;
    if (scansRes.data) state.scans = scansRes.data;
    if (traysRes.data) state.trays = traysRes.data;
    
    if (settingsRes.data) {
      const eng = settingsRes.data.find(s => s.key === 'engine');
      const gk = settingsRes.data.find(s => s.key === 'geminiKey');
      if (eng) state.engine = eng.value;
      if (gk) state.geminiKey = gk.value;
    }

    updateTrayCounters();
    useSupabase = true;
    stateLoaded = true;
    setupRealtime();
    render();
  } catch (err) {
    console.warn("Supabase fetch failed, falling back to localStorage:", err);
    state = loadLocalState();
    useSupabase = false;
    stateLoaded = true;
    render();
  }
}

function updateTrayCounters() {
  state.trayCounters = {};
  const trayMap = {};
  const mergedTrays = [];
  let changed = false;
  
  for (const t of state.trays) {
    t.trayNum = parseInt(t.trayNum, 10) || 0;
    const key = `${t.projectId}_${t.trayNum}`;
    
    if (!trayMap[key]) {
      trayMap[key] = t;
      mergedTrays.push(t);
    } else {
      // Duplicate tray found for the same tray number -> Merge sticks
      trayMap[key].sticks.push(...t.sticks);
      if (useSupabase && sb) sb.from('trays').delete().eq('id', t.id).then();
      changed = true;
    }
    
    if (!state.trayCounters[t.projectId] || t.trayNum > state.trayCounters[t.projectId]) {
      state.trayCounters[t.projectId] = t.trayNum;
    }
  }
  
  if (changed) {
    state.trays = mergedTrays;
    saveLocalState();
    if (useSupabase && sb) {
      Object.values(trayMap).forEach(t => {
        sb.from('trays').update({ sticks: t.sticks }).eq('id', t.id).then();
      });
    }
  }
}

function setupRealtime() {
  if (!sb) return;
  sb.channel('public:any')
    .on('postgres_changes', { event: '*', schema: 'public' }, () => fetchDataSilent())
    .subscribe();
}

window.isBulkScanning = false;

async function fetchDataSilent() {
  if (!sb || window.isBulkScanning) return;
  try {
    const [projectsRes, scansRes, traysRes, settingsRes] = await Promise.all([
      sb.from('projects').select('*'),
      sb.from('scans').select('*').order('ts', { ascending: false }),
      sb.from('trays').select('*'),
      sb.from('settings').select('*')
    ]);
    
    if (projectsRes.data) state.projects = projectsRes.data;
    if (scansRes.data) state.scans = scansRes.data;
    if (traysRes.data) state.trays = traysRes.data;
    
    if (settingsRes.data) {
      const eng = settingsRes.data.find(s => s.key === 'engine');
      const gk = settingsRes.data.find(s => s.key === 'geminiKey');
      if (eng) state.engine = eng.value;
      if (gk) state.geminiKey = gk.value;
    }
    
    updateTrayCounters();
    render();
  } catch (err) { console.warn("Realtime refresh failed:", err); }
}

// Helper to save to Supabase OR localStorage
async function dbSave(table, action, data, matchField) {
  if (useSupabase && sb) {
    try {
      if (action === 'insert') await sb.from(table).insert(data);
      else if (action === 'update') await sb.from(table).update(data.updates).eq(matchField, data.id);
      else if (action === 'upsert') await sb.from(table).upsert(data);
    } catch (err) { console.warn(`DB ${action} failed:`, err); }
  }
  saveLocalState();
}

// Session state (not persisted)
let session = {
  currentUser: null,
  currentProjectId: null,
  page: "scanner",     // "projects" | "scanner" | "trays" | "history" | "admin"
  authView: "login",
};

/* ════════════════════════════════════════════════════════════════════════
   CONSTANTS
   ════════════════════════════════════════════════════════════════════════ */
const BRAND_META = {

const SAMPLE_SCANS = [
  "PH M393B2G70QH0-YK0 1418",
  "CN M471A1K43DB1-CTD 1617",
  "KR HMT451U6BFR8A-PB 1523",

  "(L)128GB 2Rx4 PC5-5600B-RA0-1010-XT(S)80CE012521019C37A6(P)M321RAJA0MB0-CWMNY(M)W00AD20",

/* ════════════════════════════════════════════════════════════════════════
   CLASSIFIER — rule-based + optional Gemini AI
   ════════════════════════════════════════════════════════════════════════ */
function classifyWithRules(scan) {
  if (!scan) return null;
  const s = scan.toUpperCase();

  let partNumber = "";
  if (scan.includes("(P)")) {
    const a = scan.slice(scan.indexOf("(P)") + 3);
    const tags = ["(M)", "(S)", "(L)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    const end = tags.length ? Math.min(...tags) : a.length;
    const pStr = a.slice(0, end).trim();
    const parts = pStr.split(/\s+/);
    partNumber = (parts.length > 1 && parts[0].length <= 3 ? parts[1] : parts[0]) || "";
  } else {
    const clean = scan.replace(/©MLCC/gi, "").replace(/©mlcc/gi, "").trim();
    const parts = clean.split(/\s+/);
    partNumber = (parts.length > 1 && parts[0].length <= 3 ? parts[1] : parts[0]) || "";
  }
  let serial = "";
  if (scan.includes("(S)")) {
    const a = scan.slice(scan.indexOf("(S)") + 3);
    const tags = ["(P)", "(L)", "(M)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    serial = a.slice(0, tags.length ? Math.min(...tags) : a.length).trim();
  }
  let label = "";
  if (scan.includes("(L)")) {
    const a = scan.slice(scan.indexOf("(L)") + 3);
    const tags = ["(S)", "(P)", "(M)"].map(t => a.indexOf(t)).filter(i => i >= 0);
    label = a.slice(0, tags.length ? Math.min(...tags) : a.length).trim();
  }

  const P = partNumber.toUpperCase();

  // ── GENERATION DETECTION (most specific first) ──────────────────────
  let generation = "Unknown";
  // Explicit text match (highest priority)
  if (s.includes("DDR5") || s.includes("PC5-") || s.includes("PC5_")) generation = "DDR5";
  else if (s.includes("DDR4") || s.includes("PC4-") || s.includes("PC4_")) generation = "DDR4";
  else if (s.includes("DDR3") || s.includes("PC3-") || s.includes("PC3_")) generation = "DDR3";
  // SK Hynix generation from prefix
  else if (P.startsWith("HMCG") || P.startsWith("HMCT")) generation = "DDR5";
  else if (P.startsWith("HMT") || P.startsWith("HMN")) generation = "DDR3";
  else if (P.startsWith("HMA") || P.startsWith("HMAA")) generation = "DDR4";
  else if (P.startsWith("HMB")) generation = "DDR5";
  // Samsung module generation from 5th char
  else if (P.startsWith("M471") || P.startsWith("M378") || P.startsWith("M393") || P.startsWith("M386") || P.startsWith("M474") || P.startsWith("M391")) {
    const c = P.substr(4, 1);
    generation = c === "A" ? "DDR4" : c === "B" ? "DDR5" : "DDR3";
  }
  // Samsung component-level chips
  else if (P.startsWith("K4A") || P.startsWith("K4AB")) generation = "DDR4";
  else if (P.startsWith("K4RA") || P.startsWith("K4RB")) generation = "DDR5";
  else if (P.startsWith("K4B") || P.startsWith("K4T")) generation = "DDR3";
  // G.Skill — F4 = DDR4, F5 = DDR5, F3 = DDR3
  else if (P.startsWith("F5-") || P.startsWith("F5U") || P.startsWith("F5S")) generation = "DDR5";
  else if (P.startsWith("F4-") || P.startsWith("F4U")) generation = "DDR4";
  else if (P.startsWith("F3-")) generation = "DDR3";
  // Corsair — X4 = DDR4, X5 = DDR5 (embedded in part number)
  else if (P.includes("X5M") || P.includes("X5N")) generation = "DDR5";
  else if (P.includes("X4M") || P.includes("X4N")) generation = "DDR4";
  // ADATA — AD5 = DDR5, AD4 = DDR4, AD3 = DDR3
  else if (P.startsWith("AD5") || P.startsWith("AX5")) generation = "DDR5";
  else if (P.startsWith("AD4") || P.startsWith("AX4")) generation = "DDR4";
  else if (P.startsWith("AD3") || P.startsWith("AX3")) generation = "DDR3";
  // Nanya — NT5A = DDR4, NT5F = DDR5, NT5C = DDR3
  else if (P.startsWith("NT5F")) generation = "DDR5";
  else if (P.startsWith("NT5A")) generation = "DDR4";
  else if (P.startsWith("NT5C")) generation = "DDR3";
  // Patriot — PSD5/PVV5 = DDR5, PSD4/PVE4 = DDR4
  else if (P.startsWith("PSD5") || P.startsWith("PVV5") || P.startsWith("PSC5")) generation = "DDR5";
  else if (P.startsWith("PSD4") || P.startsWith("PVE4") || P.startsWith("PV4")) generation = "DDR4";
  else if (P.startsWith("PSD3")) generation = "DDR3";
  // TeamGroup — TED5 = DDR5, TED4 = DDR4
  else if (P.startsWith("TED5") || P.startsWith("FF5")) generation = "DDR5";
  else if (P.startsWith("TED4") || P.startsWith("FF4")) generation = "DDR4";
  // Micron — MTA = modules
  else if (P.startsWith("MTC")) generation = "DDR5";
  else if (P.startsWith("MTA")) generation = "DDR4";
  else if (P.startsWith("MT4") || P.startsWith("MT8") || P.startsWith("MT16") || P.startsWith("MT18") || P.startsWith("MT36") || P.startsWith("MT9")) {
    // Micron module — use speed suffix or fallback
    if (s.includes("2G3") || s.includes("2G6") || s.includes("2G9") || s.includes("3G2")) generation = "DDR4";
    else if (s.includes("4G") || s.includes("5G") || s.includes("6G")) generation = "DDR5";
  }

  // ── BRAND DETECTION (most specific first) ───────────────────────────
  let brand = "Unknown";
  
  // 1. Explicit brand name in scan text
  if (s.includes("SAMSUNG")) brand = "Samsung";
  else if (s.includes("HYNIX") || s.includes("SK HYNIX")) brand = "SK Hynix";
  else if (s.includes("MICRON")) brand = "Micron";
  else if (s.includes("CRUCIAL")) brand = "Crucial";
  else if (s.includes("KINGSTON") || s.includes("KING STON")) brand = "Kingston";
  else if (s.includes("CORSAIR")) brand = "Corsair";
  else if (s.includes("G.SKILL") || s.includes("GSKILL") || s.includes("G SKILL")) brand = "G.Skill";
  else if (s.includes("ADATA") || s.includes("A-DATA")) brand = "ADATA";
  else if (s.includes("PATRIOT")) brand = "Patriot";
  else if (s.includes("TEAMGROUP") || s.includes("TEAM GROUP") || s.includes("T-FORCE")) brand = "TeamGroup";
  else if (s.includes("TRANSCEND")) brand = "Transcend";
  else if (s.includes("NANYA")) brand = "Nanya";
  else if (s.includes("RAMAXEL")) brand = "Ramaxel";
  else if (s.includes("MUSHKIN")) brand = "Mushkin";
  else if (s.includes("APACER")) brand = "Apacer";
  else if (s.includes("INNODISK")) brand = "Innodisk";
  else if (s.includes("SMART MODULAR") || (s.includes("SMART") && s.includes("DDR"))) brand = "Smart";
  else if (s.includes("PNY")) brand = "PNY";
  else if (s.includes("AVANT")) brand = "Avant";
  
  // 2. Part number prefix detection
  else {
    // Samsung — M3xx, M4xx, K4xx module/chip prefixes
    if (P.startsWith("M378") || P.startsWith("M471") || P.startsWith("M393") || P.startsWith("M386") || P.startsWith("M474") || P.startsWith("M391") || P.startsWith("M395") || P.startsWith("K4A") || P.startsWith("K4B") || P.startsWith("K4R") || P.startsWith("K4T") || P.startsWith("K4E") || P.startsWith("K4AB") || P.startsWith("K4RA") || P.startsWith("K4RB")) brand = "Samsung";
    // SK Hynix — HMT/HMA/HMB/HMCG/HX
    else if (P.startsWith("HMT") || P.startsWith("HMA") || P.startsWith("HMB") || P.startsWith("HMCG") || P.startsWith("HMCT") || P.startsWith("HMAA") || P.startsWith("HMN") || P.startsWith("H5") || P.startsWith("HX")) brand = "SK Hynix";
    // Micron — MT/MTA/MTC
    else if (P.startsWith("MT") && !P.startsWith("MTE")) brand = "Micron";
    // Crucial — CT
    else if (P.startsWith("CT") && !P.startsWith("CTX")) brand = "Crucial";
    // Kingston — KVR (ValueRAM), KSM (Server Premier), KF (FURY), 99xx (legacy)
    // Kingston OEM — ACR (Acer), ASU (ASUS), HP, AM, DELL, LNV (Lenovo)
    else if (P.startsWith("KVR") || P.startsWith("KSM") || P.startsWith("KF3") || P.startsWith("KF4") || P.startsWith("KF5") || P.startsWith("KTH") || P.startsWith("KTD") || P.startsWith("KTL") || P.startsWith("KTW") || P.startsWith("KN") || P.startsWith("KCP") || P.startsWith("99U") || P.startsWith("99P") || P.startsWith("9905") || P.startsWith("9965") || P.startsWith("ACR") || P.startsWith("ASU") || P.startsWith("AM")) brand = "Kingston";
    // Corsair — CM (Corsair Memory)
    else if (P.startsWith("CM")) brand = "Corsair";
    // G.Skill — F3/F4/F5
    else if (P.startsWith("F3-") || P.startsWith("F4-") || P.startsWith("F5-") || P.startsWith("F3U") || P.startsWith("F4U") || P.startsWith("F5U") || P.startsWith("F4S") || P.startsWith("F5S")) brand = "G.Skill";
    // ADATA — AD/AX
    else if (P.startsWith("AD") || P.startsWith("AX3") || P.startsWith("AX4") || P.startsWith("AX5")) brand = "ADATA";
    // Patriot — PSD, PV, PVV, PSC, PSP
    else if (P.startsWith("PSD") || P.startsWith("PV") || P.startsWith("PSC") || P.startsWith("PSP") || P.startsWith("PVE")) brand = "Patriot";
    // TeamGroup — TED, TTZD, FF, TF
    else if (P.startsWith("TED") || P.startsWith("TTZD") || P.startsWith("FF3") || P.startsWith("FF4") || P.startsWith("FF5") || P.startsWith("TF")) brand = "TeamGroup";
    // PNY — MD
    else if (P.startsWith("MD") && (P.includes("GSD") || P.includes("GD"))) brand = "PNY";
    // Transcend — TS, JM (JetRam)
    else if (P.startsWith("TS") && P.length > 6) brand = "Transcend";
    else if (P.startsWith("JM") && P.length > 6) brand = "Transcend";
    // Nanya — NT
    else if (P.startsWith("NT5") || P.startsWith("NT8") || P.startsWith("NT4")) brand = "Nanya";
    // Ramaxel — RMT, RMR, RMSA, RMN
    else if (P.startsWith("RMT") || P.startsWith("RMR") || P.startsWith("RMSA") || P.startsWith("RMN")) brand = "Ramaxel";
    // Mushkin — ME, MBB, MRB, MSK
    else if (P.startsWith("MES") || P.startsWith("MBB") || P.startsWith("MRB") || P.startsWith("MSK") || P.startsWith("MEB") || P.startsWith("MAR")) brand = "Mushkin";
    // Apacer — 78. or AP prefix
    else if (P.startsWith("78.") || P.startsWith("AP") || P.startsWith("AU") || P.startsWith("AS") && P.length > 8) brand = "Apacer";
    // Smart Modular — SH, SP, SG
    else if (P.startsWith("SH") || P.startsWith("SP4") || P.startsWith("SG") || P.startsWith("SGN")) brand = "Smart";
    // Innodisk — M4S, M4C, M3S
    else if (P.startsWith("M4S") || P.startsWith("M4C") || P.startsWith("M3S") || P.startsWith("M3C")) brand = "Innodisk";
  }

  let confidence = 0.5;
  if (brand !== "Unknown" && generation !== "Unknown") confidence = 0.95;
  else if (brand !== "Unknown") confidence = 0.8;
  else if (generation !== "Unknown") confidence = 0.7;

  return { brand, generation, partNumber, serial, label, confidence, method: "rule" };
}

const CLASSIFIER_PROMPT = `You are a DDR memory module identification expert. Analyze QR scan strings.
GENERATION: DDR5 only if "DDR5"/"PC5-" present. DDR4 if "DDR4"/"PC4-". DDR3 if "DDR3"/"PC3-". HMT→DDR3, HMA→DDR4, HMB→DDR5. M471/M378/M393: A=DDR4, B=DDR5, else DDR3.
BRAND: Samsung, SK Hynix, Micron, Crucial, Kingston, or Unknown.
EXTRACT: Serial between (S) and next tag. Part between (P) and next tag. Label between (L) and next tag.
NEVER guess. DDR5 only if explicit. Output ONLY this JSON:
{"brand":"...","generation":"...","partNumber":"...","serial":"...","label":"...","confidence":0.95}`;

async function classifyWithGemini(scan, apiKey) {
  if (!apiKey) return null;
  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: CLASSIFIER_PROMPT }] },
        contents: [{ parts: [{ text: `SCAN: ${scan}` }] }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 300 },
      }),
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const cleaned = text.replace(/```json|```/g, "").trim();
    return { ...JSON.parse(cleaned), method: "gemini" };
  } catch { return null; }
}

async function classify(scan) {
  if (state.engine === "gemini" && state.geminiKey) {
    const r = await classifyWithGemini(scan, state.geminiKey);
    if (r && r.confidence >= 0.75) return r;
    const fb = classifyWithRules(scan);
    return fb ? { ...fb, method: "rule_fallback" } : null;
  }
  return classifyWithRules(scan);
}

/* ════════════════════════════════════════════════════════════════════════
   TRAY ASSIGNMENT
   ════════════════════════════════════════════════════════════════════════ */
function assignTray(projectId, userId, classification) {
  if (!classification?.partNumber) return null;
  const project = state.projects.find(p => p.id === projectId);
  if (!project) return null;

  const part = classification.partNumber.toUpperCase();
  const candidates = state.trays.filter(t => {
    if (t.projectId !== projectId) return false;
    if (t.partNumber.toUpperCase() !== part) return false;
    if (project.mode === "separate" && t.ownerUserId !== userId) return false;
    return true;
  });

  const sorted = [...candidates].sort((a, b) => b.createdAt - a.createdAt);
  const open = sorted.find(t => t.sticks.length < t.capacity);
  if (open) return { tray: open, status: "ADDED" };

  const counter = state.trayCounters[projectId] || 0;
  const newNum = counter + 1;
  const newTray = {
    id: `t_${projectId}_${newNum}`,
    projectId, ownerUserId: project.mode === "separate" ? userId : null,
    partNumber: classification.partNumber,
    label: classification.label || "",
    brand: classification.brand,
    generation: classification.generation,
    trayNum: newNum,
    capacity: project.defaultCap,
    sticks: [],
    createdAt: Date.now(),
    createdBy: userId,
    projectName: project.name,
  };
  return { tray: newTray, status: candidates.length > 0 ? "OVERFLOW" : "NEW", isNew: true, newNum };
}

function setAuthView(v) { session.authView = v; render(); }

async function doAuth() {
  const username = document.getElementById("auth-user").value.trim();
  const password = document.getElementById("auth-pass").value;
  const msgEl = document.getElementById("auth-msg");
  msgEl.innerHTML = "";

  if (!username || !password) {
    msgEl.innerHTML = `<div class="alert alert-error">Enter username and password</div>`;
    return;
  }

  if (session.authView === "register") {
    if (state.users.find(u => u.username === username)) {
      msgEl.innerHTML = `<div class="alert alert-error">Username taken</div>`;
      return;
    }
    if (password.length < 4) {
      msgEl.innerHTML = `<div class="alert alert-error">Password must be ≥ 4 characters</div>`;
      return;
    }
    const newUser = {
      id: `u${state.users.length + 1}`,
      username, password, role: "scanner", name: username,
      color: `hsl(${Math.floor(Math.random()*360)}, 70%, 50%)`,
    };
    state.users.push(newUser);
    await dbSave('users', 'insert', newUser);
    session.authView = "login";
    render();
    setTimeout(() => {
      const m = document.getElementById("auth-msg");
      if (m) m.innerHTML = `<div class="alert alert-success">Account created. Sign in.</div>`;
    }, 50);
    return;
  }

  const user = state.users.find(u => u.username === username && u.password === password);
  if (!user) {
    msgEl.innerHTML = `<div class="alert alert-error">Invalid credentials</div>`;
    return;
  }
  session.currentUser = user;
  session.currentProjectId = null;
  render();
}

function logout() {
  session.currentUser = null;
  session.currentProjectId = null;
  session.authView = "login";
  render();
}

let createProjectMode = "mixed";
let createProjectMembers = new Set();

function setMode(m) {
  createProjectMode = m;
  document.querySelectorAll(".mode-opt").forEach(el => {
    el.classList.toggle("active", el.dataset.mode === m);
  });
}
function toggleMember(uid) {
  if (createProjectMembers.has(uid)) createProjectMembers.delete(uid);
  else createProjectMembers.add(uid);
  document.querySelectorAll(".member-opt").forEach(el => {
    const sel = createProjectMembers.has(el.dataset.uid);
    el.style.borderColor = sel ? state.users.find(u => u.id === el.dataset.uid).color : "#2a2a35";
    el.style.background = sel ? "#15151c" : "transparent";
    el.querySelector(".member-check").style.display = sel ? "inline" : "none";
  });
}

async function doCreateProject() {
  const name = document.getElementById("np-name").value.trim();
  const cap = parseInt(document.getElementById("np-cap").value) || 50;
  const ap = document.getElementById("np-autoprint").checked;
  const msgEl = document.getElementById("np-msg");
  msgEl.innerHTML = "";

  if (!name) { msgEl.innerHTML = `<div class="alert alert-error">Name required</div>`; return; }
  if (createProjectMembers.size === 0) { msgEl.innerHTML = `<div class="alert alert-error">Select at least one member</div>`; return; }

  const newProject = {
    id: `p${Date.now()}`, name, mode: createProjectMode,
    memberIds: Array.from(createProjectMembers),
    defaultCap: cap, autoprint: ap,
    createdBy: session.currentUser.id, createdAt: Date.now(),
  };
  state.projects.push(newProject);
  await dbSave('projects', 'insert', newProject);
  
  hideModal();
  // Reset
  createProjectMode = "mixed";
  createProjectMembers = new Set();
  selectProject(newProject.id);
}

        if (si2 && !si2.value.trim() && document.activeElement === ti) { si2.focus(); return; }
      }
      doScan();

}

function setScanMode(mode) { scanMode = mode; renderScanner(); }
function clearScanInputs() {
  const si = document.getElementById("scan-input");
  const sr = document.getElementById("serial-input");
  if (si) si.value = '';
  if (sr) sr.value = '';
}

async function doBulkScan() {
  const input = document.getElementById("scan-input");
  const btn = document.getElementById("scan-btn");
  const lines = input.value.trim().split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) { showToast('Paste scan data (one per line)', '#ff6b8a'); return; }
  
  btn.textContent = `Processing 0/${lines.length}...`;
  btn.disabled = true;
  window.isBulkScanning = true;
  let success = 0;
  for (let i = 0; i < lines.length; i++) {
    btn.textContent = `Processing ${i+1}/${lines.length}...`;
    const scan = lines[i];
    const result = await classify(scan);
    if (!result || !result.partNumber) continue;
    
    let assignment = assignTray(session.currentProjectId, session.currentUser.id, result);
    if (!assignment) continue;
    
    const scanId = `s_${Date.now()}_${Math.floor(Math.random()*1000)}_${i}`;
    const newScan = {
      id: scanId, projectId: session.currentProjectId, userId: session.currentUser.id,
      ts: Date.now() + i, scan, result, trayId: assignment.tray.id,
    };
    if (assignment.isNew) {
      const newTrayData = { ...assignment.tray, sticks: [scanId] };
      state.trays.push(newTrayData);
      state.trayCounters[session.currentProjectId] = assignment.newNum;
      await dbSave('trays', 'insert', newTrayData);
    } else {
      const tray = state.trays.find(t => t.id === assignment.tray.id);
      tray.sticks.push(scanId);
      await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
    }
    state.scans.unshift(newScan);
    await dbSave('scans', 'insert', newScan);
    success++;
    
    // Add a 50ms delay between processing each stick to absolutely guarantee no overlap
    await new Promise(r => setTimeout(r, 50));
  }
  
  window.isBulkScanning = false;
  btn.textContent = 'Scan All \u25b6';
  btn.disabled = false;
  input.value = '';
  showToast(`\u2713 Bulk scan: ${success}/${lines.length} processed`, '#3ed685');
  renderScanner();
}

function loadSample() {
  document.getElementById("scan-input").value = SAMPLE_SCANS[Math.floor(Math.random() * SAMPLE_SCANS.length)];
}

async function toggleAutoprint(checked) {
  const p = state.projects.find(p => p.id === session.currentProjectId);
  if (p) { 
    p.autoprint = checked; 
    await dbSave('projects', 'update', { updates: { autoprint: checked }, id: p.id }, 'id');
  }
}

async function doScan() {
  const input = document.getElementById("scan-input");
  const btn = document.getElementById("scan-btn");
  let scan = input.value.trim();
  
  // In dual mode, combine part number + serial into a tagged string
  if (scanMode === 'dual') {
    const serialInput = document.getElementById("serial-input");
    const partScan = scan;
    const serialScan = serialInput ? serialInput.value.trim() : '';
    if (!partScan) { showToast("Enter the Part Number scan", "#ff6b8a"); return; }
    // Build a combined tagged string
    scan = `(P)${partScan}`;
    if (serialScan) scan += ` (S)${serialScan}`;
  }
  
  if (!scan) return;
  
  btn.textContent = "Analyzing…";
  btn.disabled = true;
  
  const result = await classify(scan);
  if (!result) {
    showToast("Classification failed", "#ff6b8a");
    btn.textContent = "Scan ▶"; btn.disabled = false;
    return;
  }
  const assignment = assignTray(session.currentProjectId, session.currentUser.id, result);
  if (!assignment) {
    showToast("No part number — cannot assign tray", "#ff6b8a");
    btn.textContent = "Scan ▶"; btn.disabled = false;
    return;
  }
  
  const scanId = `s_${Date.now()}_${Math.floor(Math.random()*1000)}`;
  const newScan = {
    id: scanId, projectId: session.currentProjectId, userId: session.currentUser.id,
    ts: Date.now(), scan, result, trayId: assignment.tray.id,
  };
  
  if (assignment.isNew) {
    state.trays.push({ ...assignment.tray, sticks: [scanId] });
    state.trayCounters[session.currentProjectId] = assignment.newNum;
    await dbSave('trays', 'insert', { ...assignment.tray, sticks: [scanId] });
  } else {
    const tray = state.trays.find(t => t.id === assignment.tray.id);
    tray.sticks.push(scanId);
    await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
  }
  state.scans.unshift(newScan);
  await dbSave('scans', 'insert', newScan);
  
  input.value = "";
  btn.textContent = "Scan ▶"; btn.disabled = false;
  
  const trayN = assignment.tray.trayNum || assignment.newNum;
  const project = state.projects.find(p => p.id === session.currentProjectId);
  
  // Render result card
  renderResultCard(newScan, assignment);
  
  // Show toast
  if (assignment.status === "NEW") showToast(`✓ NEW PART → Tray #${trayN}`, "#3ed685");
  else if (assignment.status === "OVERFLOW") showToast(`⊕ OVERFLOW → New Tray #${trayN}`, "#4fa3ff");
  else showToast(`✓ Added to Tray #${trayN}`, "#FFD700");
  
  // Auto-print if enabled and new tray
  if (assignment.isNew && project.autoprint) {

    }, 400);

  // Refresh recent list
  renderScanner();
}

async function removeStickFromTray(trayId, stickIndex) {
  const tray = state.trays.find(t => t.id === trayId);
  if (!tray || !tray.sticks[stickIndex]) return;
  tray.sticks.splice(stickIndex, 1);
  await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
  renderTraysPage();
}

async function editStick(trayId, stickIndex) {
  const tray = state.trays.find(t => t.id === trayId);
  if (!tray || !tray.sticks[stickIndex]) return;
  const scanId = tray.sticks[stickIndex];
  const scan = state.scans.find(s => s.id === scanId);
  if (!scan) return;
  const newPart = prompt(`Edit Part Number:`, scan.result?.partNumber || "");
  if (newPart !== null && newPart.trim() !== "") {
    const p = newPart.trim().toUpperCase();
    if (p === (scan.result?.partNumber || "").toUpperCase()) return; // No change
    
    // Update scan part number
    scan.result.partNumber = p;
    await dbSave('scans', 'update', { updates: { result: scan.result }, id: scan.id }, 'id');
    
    // Automatically reassign
    const assignment = assignTray(session.currentProjectId, session.currentUser.id, scan.result);
    if (!assignment) {
      renderTraysPage();
      return;
    }
    
    // Remove from old tray
    tray.sticks.splice(stickIndex, 1);
    await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
    
    // Add to new tray
    if (assignment.isNew) {
      const newTray = { ...assignment.tray, sticks: [scanId] };
      state.trays.push(newTray);
      state.trayCounters[session.currentProjectId] = assignment.newNum;
      await dbSave('trays', 'insert', newTray);
    } else {
      const targetTray = state.trays.find(t => t.id === assignment.tray.id);
      targetTray.sticks.push(scanId);
      await dbSave('trays', 'update', { updates: { sticks: targetTray.sticks }, id: targetTray.id }, 'id');
    }
    
    // Update scan's tray ID
    scan.trayId = assignment.tray.id;
    await dbSave('scans', 'update', { updates: { trayId: assignment.tray.id }, id: scan.id }, 'id');
    
    showToast(`Stick moved to Tray #${assignment.tray.trayNum || assignment.newNum}`, '#3ed685');
    renderTraysPage();
  }
}

async function moveStick(trayId, stickIndex) {
  const tray = state.trays.find(t => t.id === trayId);
  if (!tray || !tray.sticks[stickIndex]) return;
  const scan = state.scans.find(s => s.id === tray.sticks[stickIndex]);
  if (!scan) return;

  const newTrayNumStr = prompt(`Move stick (${scan.result?.partNumber}) to which Tray Number?`);
  if (!newTrayNumStr) return;
  const newTrayNum = parseInt(newTrayNumStr, 10);
  if (isNaN(newTrayNum)) return alert("Invalid tray number");
  if (newTrayNum === tray.trayNum) return;

  const project = state.projects.find(p => p.id === session.currentProjectId);
  let targetTray = state.trays.find(t => t.projectId === project.id && t.trayNum === newTrayNum);
  
  if (targetTray) {
    if (targetTray.partNumber.toUpperCase() !== scan.result.partNumber.toUpperCase()) {
      if (!confirm(`Warning: Target Tray #${newTrayNum} holds a different part number (${targetTray.partNumber}). Move anyway?`)) return;
    }
    if (targetTray.sticks.length >= targetTray.capacity) {
      if (!confirm(`Warning: Target Tray #${newTrayNum} is full. Move anyway?`)) return;
    }
  } else {
    targetTray = {
      id: `t_${project.id}_${newTrayNum}_${Date.now()}`,
      projectId: project.id, ownerUserId: session.currentUser.id,
      partNumber: scan.result.partNumber, label: scan.result.label || "", brand: scan.result.brand || "Unknown", generation: scan.result.generation || "Unknown",
      trayNum: newTrayNum, capacity: project.defaultCap, sticks: [],
      createdAt: Date.now(), createdBy: session.currentUser.id, projectName: project.name
    };
    state.trays.push(targetTray);
    await dbSave('trays', 'insert', targetTray);
  }

  tray.sticks.splice(stickIndex, 1);
  await dbSave('trays', 'update', { updates: { sticks: tray.sticks }, id: tray.id }, 'id');
  targetTray.sticks.push(scan.id);
  await dbSave('trays', 'update', { updates: { sticks: targetTray.sticks }, id: targetTray.id }, 'id');
  scan.trayId = targetTray.id;
  await dbSave('scans', 'update', { updates: { trayId: targetTray.id }, id: scan.id }, 'id');
  
  renderTraysPage();
}

function confirmDeleteTray(trayId) {
  const tray = state.trays.find(t => t.id === trayId);
  if (!tray) return;
  showModal(`
    <h2 class="h2" style="color: #ff6b8a; margin-bottom: 12px;">Delete Tray #${tray.trayNum}?</h2>
    <div class="mono" style="font-size: 12px; color: #888; margin-bottom: 8px;">${escapeHtml(tray.partNumber)}</div>
    <div style="font-size: 13px; color: #e8e8ee; margin-bottom: 16px; line-height: 1.6;">
      This will permanently remove <b style="color: #ff6b8a;">${tray.sticks.length} scan(s)</b> from this tray.<br>
      Tray numbers of other trays will <b>not</b> change.
    </div>
    <div class="flex gap-8" style="justify-content: flex-end;">
      <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn" style="background: #ff6b8a; color: #fff;" onclick="deleteTray('${tray.id}')">Delete tray</button>
    </div>
  `);
}

async function deleteTray(trayId) {
  const tray = state.trays.find(t => t.id === trayId);
  if (!tray) return;
  // Remove associated scans
  const removedScanIds = new Set(tray.sticks);
  state.scans = state.scans.filter(s => !removedScanIds.has(s.id));
  // Remove the tray (do NOT renumber other trays)
  state.trays = state.trays.filter(t => t.id !== trayId);
  // Persist
  if (useSupabase && sb) {
    try {
      await sb.from('scans').delete().in('id', [...removedScanIds]);
      await sb.from('trays').delete().eq('id', trayId);
    } catch (err) { console.warn('Delete tray DB error:', err); }
  }
  saveLocalState();
  hideModal();
  showToast(`Tray #${tray.trayNum} deleted`, '#ff6b8a');
  renderTraysPage();
}

/* ════════════════════════════════════════════════════════════════════════
   HISTORY PAGE
   ════════════════════════════════════════════════════════════════════════ */
let historyFilter = "all";
function renderHistoryPage() {
  const project = state.projects.find(p => p.id === session.currentProjectId);
  const projectScans = state.scans.filter(s => s.projectId === project.id);
  const q = globalSearchQuery.toLowerCase().trim();
  const filtered = (historyFilter === "all" ? projectScans : projectScans.filter(s => s.userId === historyFilter)).filter(s => {
    if (!q) return true;
    const trayNum = state.trays.find(t => t.id === s.trayId)?.trayNum?.toString() || "";
    return (s.result?.partNumber || "").toLowerCase().includes(q) || trayNum === q;
  });
  
  document.getElementById("page-content").innerHTML = `
    <div class="flex items-center justify-between" style="margin-bottom: 16px;">
      <h1 class="h" style="margin-bottom: 0;">History · ${filtered.reduce((sum, s) => sum + (s.quantity || 1), 0)} sticks</h1>
      <div class="flex gap-8">
        <button class="btn-ghost" style="font-size: 11px; padding: 6px 14px;" onclick="exportCSV()">📥 Export CSV</button>
        <select onchange="setHistoryFilter(this.value)" style="background: #1a1a22; color: #fff; border: 1px solid #2a2a35; padding: 8px 12px; border-radius: 8px; font-size: 12px; width: auto;">
          <option value="all">All members</option>
          ${state.users.filter(u => project.memberIds.includes(u.id)).map(u => 
            `<option value="${u.id}" ${historyFilter === u.id ? "selected" : ""}>${escapeHtml(u.name)}</option>`
          ).join("")}
        </select>
      </div>
    </div>
    
    ${filtered.length === 0 ? `
      <div class="empty">No scans yet</div>
    ` : `
      <div class="card" style="padding: 0; overflow: hidden; overflow-x: auto;">
        <div class="history-row history-head" style="grid-template-columns: 0.8fr 1.5fr 1fr 0.6fr 0.6fr 0.5fr 0.7fr 0.5fr;">
          <div>When</div><div>Part</div><div>Serial</div><div>Brand</div><div>Gen</div><div>Tray</div><div>By</div><div>Method</div>
        </div>
        ${filtered.slice(0, 200).map(s => {
          const u = state.users.find(u => u.id === s.userId);
          const tray = state.trays.find(t => t.id === s.trayId);
          return `
            <div class="history-row" style="grid-template-columns: 0.8fr 1.5fr 1fr 0.6fr 0.6fr 0.5fr 0.7fr 0.5fr;">
              <div style="color: #888;">${timeAgo(s.ts)}</div>
              <div class="mono truncate" style="color: #fff;">${escapeHtml(s.result.partNumber)}</div>
              <div class="mono truncate" style="color: #3ed685;">${escapeHtml(s.result.serial || '-')}</div>
              <div><span class="pill" style="background: ${BRAND_META[s.result.brand]?.hex || '#555'};">${s.result.brand}</span></div>
              <div><span class="pill" style="background: ${GEN_META[s.result.generation]?.bg}; color: ${GEN_META[s.result.generation]?.fg};">${s.result.generation}</span></div>
              <div style="color: #FFD700; font-weight: 700;">#${tray?.trayNum}</div>
              <div style="color: ${u?.color}; font-weight: 600;">${escapeHtml(u?.name || '?')}</div>
              <div><span class="pill" style="background: #1f1d10; color: #FFD700;">${(s.result.method || 'rule').toUpperCase()}</span></div>
            </div>
          `;
        }).join("")}
      </div>
    `}
  `;
}
function setHistoryFilter(f) { historyFilter = f; renderHistoryPage(); }

function exportCSV() {
  const project = state.projects.find(p => p.id === session.currentProjectId);
  const projectScans = state.scans.filter(s => s.projectId === project.id);
  const filtered = historyFilter === "all" ? projectScans : projectScans.filter(s => s.userId === historyFilter);
  
  const headers = ['Timestamp','Part Number','Serial','Brand','Generation','Tray#','Scanned By','Method','Label','Raw Scan'];
  const rows = filtered.map(s => {
    const u = state.users.find(u => u.id === s.userId);
    const tray = state.trays.find(t => t.id === s.trayId);
    return [
      new Date(s.ts).toLocaleString(),
      s.result.partNumber || '',
      s.result.serial || '',
      s.result.brand || '',
      s.result.generation || '',
      tray?.trayNum || '',
      u?.name || '',
      s.result.method || 'rule',
      s.result.label || '',
      s.scan || ''
    ].map(v => `"${String(v).replace(/"/g, '""')}"`);
  });
  
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name.replace(/[^a-zA-Z0-9]/g, '_')}_scans_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded!', '#3ed685');
}

/* ════════════════════════════════════════════════════════════════════════
   MASTER PAGE — tray overview grouped by user
   ════════════════════════════════════════════════════════════════════════ */
let masterFilter = "all";
function setMasterFilter(f) { masterFilter = f; renderMasterPage(); }

function renderMasterPage() {
  const project = state.projects.find(p => p.id === session.currentProjectId);
  const projectScans = state.scans.filter(s => s.projectId === project.id);
  const projectTrays = state.trays.filter(t => t.projectId === project.id).sort((a,b) => a.trayNum - b.trayNum);
  const members = state.users.filter(u => project.memberIds.includes(u.id));

  // User summary cards
  const userCards = members.map(u => {
    const uSticks = projectTrays.filter(t => t.createdBy === u.id || t.ownerUserId === u.id).reduce((sum, t) => sum + t.sticks.length, 0);
    const uTrays = projectTrays.filter(t => t.createdBy === u.id || t.ownerUserId === u.id).length;
    return `<div style="background: #1a1a22; border-radius: 10px; padding: 14px 18px; min-width: 150px; border-left: 3px solid ${u.color};">
      <div class="flex items-center gap-8" style="margin-bottom: 8px;">
        <div class="avatar avatar-sm" style="background: ${u.color};">${u.name.charAt(0).toUpperCase()}</div>
        <div><div style="font-weight: 700; color: #fff; font-size: 13px;">${escapeHtml(u.name)}</div>
        <div style="font-size: 10px; color: #888; text-transform: uppercase;">${u.role}</div></div>
      </div>
      <div class="flex gap-16" style="margin-top: 6px;">
        <div><div style="font-size: 22px; font-weight: 900; color: #fff;">${uSticks}</div><div style="font-size: 10px; color: #888; text-transform: uppercase;">sticks</div></div>
        <div><div style="font-size: 22px; font-weight: 900; color: #fff;">${uTrays}</div><div style="font-size: 10px; color: #888; text-transform: uppercase;">trays</div></div>
      </div>
    </div>`;
  }).join('');

  // Brand distribution
  const brandCounts = {};
  projectTrays.forEach(t => { brandCounts[t.brand] = (brandCounts[t.brand]||0) + 1; });
  const totalTrays = projectTrays.length || 1;
  const brandBar = Object.entries(brandCounts).sort((a,b) => b[1]-a[1]).map(([brand, count]) => {
    const bm = BRAND_META[brand] || BRAND_META.Unknown;
    const pct = (count / totalTrays * 100).toFixed(1);
    return `<div style="flex: ${count}; background: ${bm.hex}; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; letter-spacing: 0.5px; min-width: 30px;" title="${brand}: ${count} trays (${pct}%)">${brand.substring(0,3).toUpperCase()}</div>`;
  }).join('');
  const brandLegend = Object.entries(brandCounts).sort((a,b) => b[1]-a[1]).map(([brand, count]) => {
    const bm = BRAND_META[brand] || BRAND_META.Unknown;
    return `<span style="font-size: 11px; color: #888; display: inline-flex; align-items: center; gap: 4px; margin-right: 12px;"><span style="width: 8px; height: 8px; border-radius: 2px; background: ${bm.hex}; display: inline-block;"></span>${brand} ${count}</span>`;
  }).join('');

  // Filter trays
  const q = globalSearchQuery.toLowerCase().trim();
  const filteredTrays = masterFilter === "all" ? projectTrays : projectTrays.filter(t => t.createdBy === masterFilter || t.ownerUserId === masterFilter);
  const searchedTrays = filteredTrays.filter(t => {
    if (!q) return true;
    return t.partNumber.toLowerCase().includes(q) || t.trayNum.toString() === q;
  });

  // Tray table rows
  const trayRows = searchedTrays.map(t => {
    const owner = state.users.find(u => u.id === (t.ownerUserId || t.createdBy));
    const bm = BRAND_META[t.brand] || BRAND_META.Unknown;
    const gm = GEN_META[t.generation] || GEN_META.Unknown;
    const pct = (t.sticks.length / t.capacity * 100);
    const barColor = t.sticks.length >= t.capacity ? "#ff6b8a" : pct > 80 ? "#FFD700" : "#3ed685";
    return `<div style="display: grid; grid-template-columns: 0.6fr 0.4fr 1.5fr 0.6fr 0.5fr 0.4fr 1.2fr; gap: 10px; align-items: center; padding: 10px 16px; border-bottom: 1px solid #15151c; font-size: 12px;">
      <div>${owner ? `<span class="pill" style="background: ${owner.color}; font-size: 10px;">${escapeHtml(owner.name)}</span>` : '-'}</div>
      <div style="color: #FFD700; font-weight: 900; font-size: 14px;">#${t.trayNum}</div>
      <div class="mono truncate" style="color: #fff; font-weight: 600;">${escapeHtml(t.partNumber)}</div>
      <div><span class="pill" style="background: ${bm.hex}; font-size: 10px;">${escapeHtml(t.brand)}</span></div>
      <div><span class="pill" style="background: ${gm.bg}; color: ${gm.fg}; font-size: 10px;">${escapeHtml(t.generation)}</span></div>
      <div style="color: #fff; font-weight: 700; text-align: center;">${t.sticks.length}</div>
      <div class="flex items-center gap-8">
        <div class="tray-progress" style="flex: 1;"><div class="tray-progress-fill" style="width: ${pct}%; background: ${barColor};"></div></div>
        <span style="font-size: 11px; color: #888; min-width: 45px;">${t.sticks.length}/${t.capacity}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById("page-content").innerHTML = `
    <div class="flex items-center justify-between" style="margin-bottom: 16px;">
      <div>
        <h1 class="h" style="margin-bottom: 2px;">Master View \u00b7 ${masterFilter === 'all' ? 'All Users' : escapeHtml(state.users.find(u=>u.id===masterFilter)?.name || '')}</h1>
        <div style="font-size: 12px; color: #888;">${projectTrays.reduce((sum, t) => sum + t.sticks.length, 0)} sticks \u00b7 ${projectTrays.length} trays \u00b7 ${members.length} active users</div>
      </div>
      <button class="btn-ghost" style="font-size: 11px; padding: 6px 14px;" onclick="exportMasterCSV()">\u2193 Export All CSV</button>
    </div>

    <div class="flex gap-12" style="margin-bottom: 24px; flex-wrap: wrap;">${userCards}</div>

    <div style="margin-bottom: 24px;">
      <div style="font-size: 12px; font-weight: 800; color: #FFD700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; border-left: 3px solid #FFD700; padding-left: 10px;">Brand Distribution \u00b7 System-Wide</div>
      <div style="display: flex; border-radius: 6px; overflow: hidden; margin-bottom: 6px;">${brandBar || '<div style="flex:1;background:#2a2a35;height:28px;"></div>'}</div>
      <div>${brandLegend}</div>
    </div>

    <div>
      <div class="flex items-center justify-between" style="margin-bottom: 10px;">
        <div style="font-size: 12px; font-weight: 800; color: #FFD700; text-transform: uppercase; letter-spacing: 1.5px; border-left: 3px solid #FFD700; padding-left: 10px;">All Trays \u00b7 ${masterFilter === 'all' ? 'Grouped by User' : 'Filtered'} \u00b7 ${filteredTrays.length}</div>
        <select onchange="setMasterFilter(this.value)" style="background: #1a1a22; color: #fff; border: 1px solid #2a2a35; padding: 6px 10px; border-radius: 8px; font-size: 11px;">
          <option value="all" ${masterFilter==='all'?'selected':''}>All users</option>
          ${members.map(u => `<option value="${u.id}" ${masterFilter===u.id?'selected':''}>${escapeHtml(u.name)}</option>`).join('')}
        </select>
      </div>
      <div class="card" style="padding: 0; overflow: hidden;">
        <div style="display: grid; grid-template-columns: 0.6fr 0.4fr 1.5fr 0.6fr 0.5fr 0.4fr 1.2fr; gap: 10px; padding: 10px 16px; background: #15151c; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">
          <div>User</div><div>Tray</div><div>Part Number</div><div>Brand</div><div>Gen</div><div>Sticks</div><div>Capacity</div>
        </div>
        ${trayRows || '<div style="padding: 24px; text-align: center; color: #666;">No trays yet</div>'}
      </div>
    </div>
  `;
}

function exportMasterCSV() {
  const project = state.projects.find(p => p.id === session.currentProjectId);
  const projectTrays = state.trays.filter(t => t.projectId === project.id).sort((a,b) => a.trayNum - b.trayNum);
  const headers = ['Tray#','Part Number','Brand','Generation','Sticks','Capacity','Owner','Created'];
  const rows = projectTrays.map(t => {
    const owner = state.users.find(u => u.id === (t.ownerUserId || t.createdBy));
    return [t.trayNum, t.partNumber, t.brand, t.generation, t.sticks.length, t.capacity, owner?.name||'', new Date(t.createdAt).toLocaleDateString()].map(v => `"${String(v).replace(/"/g,'""')}"`);
  });
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `master-list-${project.name.replace(/[^a-zA-Z0-9]/g,'-')}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Master CSV downloaded!', '#3ed685');
}

async function toggleProjectMember(projectId, userId) {
  const p = state.projects.find(p => p.id === projectId);
  if (!p) return;
  if (p.memberIds.includes(userId)) {
    p.memberIds = p.memberIds.filter(id => id !== userId);
  } else {
    p.memberIds.push(userId);
  }
  await dbSave('projects', 'update', { updates: { memberIds: p.memberIds }, id: p.id }, 'id');
  renderAdminPage();
}
async function clearProjectData() {
  const pId = session.currentProjectId;
  if (!pId) return;
  
  const scanIdsToDelete = state.scans.filter(s => s.projectId === pId).map(s => s.id);
  const trayIdsToDelete = state.trays.filter(t => t.projectId === pId).map(t => t.id);
  
  // Local state update
  state.scans = state.scans.filter(s => s.projectId !== pId);
  state.trays = state.trays.filter(t => t.projectId !== pId);
  state.trayCounters[pId] = 0;
  
  // Supabase cleanup (if using Supabase)
  if (useSupabase) {
    try {
      if (scanIdsToDelete.length > 0) await sb.from('scans').delete().in('id', scanIdsToDelete);
      if (trayIdsToDelete.length > 0) await sb.from('trays').delete().in('id', trayIdsToDelete);
    } catch (e) {
      console.error("Supabase clear failed", e);
    }
  } else {
    saveLocalState();
  }
  
  showToast("Project data cleared.", "#FFD700");
  renderAdminPage();
}

async function deleteProjectById(pId) {
  if (!pId) return;
  
  const scanIdsToDelete = state.scans.filter(s => s.projectId === pId).map(s => s.id);
  const trayIdsToDelete = state.trays.filter(t => t.projectId === pId).map(t => t.id);
  
  state.scans = state.scans.filter(s => s.projectId !== pId);
  state.trays = state.trays.filter(t => t.projectId !== pId);
  state.projects = state.projects.filter(p => p.id !== pId);
  delete state.trayCounters[pId];
  
  if (useSupabase) {
    try {
      if (scanIdsToDelete.length > 0) await sb.from('scans').delete().in('id', scanIdsToDelete);
      if (trayIdsToDelete.length > 0) await sb.from('trays').delete().in('id', trayIdsToDelete);
      await sb.from('projects').delete().eq('id', pId);
    } catch (e) {
      console.error("Supabase project delete failed", e);
    }
  }
  
  saveLocalState();
  if (session.currentProjectId === pId) {
    switchProject();
  } else {
    render();
  }
}

async function promptDeleteProject(pId, pName) {
  const answer = prompt(`To permanently delete project "${pName}" and all its data, type DELETE below:`);
  if (answer === "DELETE") {
    await deleteProjectById(pId);
    showToast("Project deleted.", "#ff4444");
  }
}

async function resetAllSystemData() {
  const scanIds = state.scans.map(s => s.id);
  const trayIds = state.trays.map(t => t.id);
  const projIds = state.projects.map(p => p.id);
  
  state.projects = [];
  state.scans = [];
  state.trays = [];
  state.trayCounters = {};
  
  if (useSupabase && sb) {
    try {
      if (scanIds.length > 0) await sb.from('scans').delete().in('id', scanIds);
      if (trayIds.length > 0) await sb.from('trays').delete().in('id', trayIds);
      if (projIds.length > 0) await sb.from('projects').delete().in('id', projIds);
    } catch (e) { console.error("Supabase reset failed", e); }
  }
  
  saveLocalState();
  session.currentProjectId = null;
  render();
  showToast("All projects, scans, and trays have been deleted. Users were preserved.", "#3ed685");
}

function promptResetAllData() {

async function handleCSVImport() {
  const fileInput = document.getElementById("csv-upload");
  if (!fileInput.files || fileInput.files.length === 0) {
    showToast("Please select a CSV file", "#ff6b8a");
    return;
  }
  const file = fileInput.files[0];
  const text = await file.text();
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length < 2) { showToast("CSV is empty or missing headers", "#ff6b8a"); return; }
  
  const parseLine = (line) => {
    const result = [];
    let cur = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') inQuotes = !inQuotes;
      else if (line[i] === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    result.push(cur.trim());
    return result;
  };
  
  const headers = parseLine(lines[0]);
  const normHeaders = headers.map(h => h.toLowerCase().replace(/[^a-z]/g, ''));
  
  // Auto-detect indices
  const idxPart = normHeaders.findIndex(h => h.includes('part'));
  const idxTray = normHeaders.findIndex(h => h === 'tray' || h === 'traynumber');
  const idxBrand = normHeaders.findIndex(h => h.includes('brand'));
  const idxGen = normHeaders.findIndex(h => h.includes('gen'));
  const idxSerial = normHeaders.findIndex(h => h.includes('serial'));
  const idxScan = normHeaders.findIndex(h => h.includes('scan') || h.includes('qr'));
  const idxQty = normHeaders.findIndex(h => h.includes('qty') || h.includes('quantity'));
  
  const firstRow = lines.length > 1 ? parseLine(lines[1]) : [];
  
  const getOptions = (selectedIdx) => {
    return `<option value="-1">-- Ignore / Not in CSV --</option>` + 
           headers.map((h, i) => `<option value="${i}" ${i === selectedIdx ? 'selected' : ''}>[Col ${i+1}] ${escapeHtml(h)} (e.g. ${escapeHtml(firstRow[i] || '')})</option>`).join('');
  };
  
  const modalHTML = `
    <h2 class="h2" style="margin-bottom: 16px;">Map CSV Columns</h2>
    <div style="font-size: 12px; color: #888; margin-bottom: 20px;">
      Please assign your CSV columns to the system fields.
    </div>
    
    <div style="display: grid; gap: 12px; margin-bottom: 24px;">
      <div>
        <div class="label" style="color: #FFD700;">Part Number * (Required)</div>
        <select id="map-part" style="width: 100%;">${getOptions(idxPart)}</select>
      </div>
      <div>
        <div class="label" style="color: #FFD700;">Tray Number * (Required)</div>
        <select id="map-tray" style="width: 100%;">${getOptions(idxTray)}</select>
      </div>
      <div>
        <div class="label">Brand</div>
        <select id="map-brand" style="width: 100%;">${getOptions(idxBrand)}</select>
      </div>
      <div>
        <div class="label">Generation (e.g. DDR4)</div>
        <select id="map-gen" style="width: 100%;">${getOptions(idxGen)}</select>
      </div>
      <div>
        <div class="label">Serial Number</div>
        <select id="map-serial" style="width: 100%;">${getOptions(idxSerial)}</select>
      </div>
      <div>
        <div class="label">Quantity</div>
        <select id="map-qty" style="width: 100%;">${getOptions(idxQty)}</select>
      </div>
      <div>
        <div class="label">QR Scan Input (Raw string)</div>
        <select id="map-scan" style="width: 100%;">${getOptions(idxScan)}</select>
      </div>
    </div>
    
    <div class="flex items-center justify-between" style="margin-top: 24px;">
      <button class="btn-ghost" onclick="hideModal()">Cancel</button>
      <button class="btn" onclick="executeCSVImport()">Confirm & Import ${lines.length - 1} Scans</button>
    </div>
  `;
  
  // Store lines in a global/state temporary variable for execution
  window._pendingCSVImportLines = lines;
  window._pendingCSVImportParseLine = parseLine;
  
  showModal(modalHTML);
}

async function executeCSVImport() {
  const lines = window._pendingCSVImportLines;
  const parseLine = window._pendingCSVImportParseLine;
  if (!lines || !parseLine) return;
  
  const idxPart = parseInt(document.getElementById("map-part").value, 10);
  const idxTray = parseInt(document.getElementById("map-tray").value, 10);
  const idxBrand = parseInt(document.getElementById("map-brand").value, 10);
  const idxGen = parseInt(document.getElementById("map-gen").value, 10);
  const idxSerial = parseInt(document.getElementById("map-serial").value, 10);
  const idxScan = parseInt(document.getElementById("map-scan").value, 10);
  const idxQty = parseInt(document.getElementById("map-qty").value, 10);
  
  if (idxPart === -1 || idxTray === -1) {
    showToast("Part Number and Tray columns are required.", "#ff6b8a");
    return;
  }
  
  hideModal();
  document.getElementById("page-content").innerHTML = `<div class="page"><div style="color: #FFD700; font-size: 16px; font-weight: 600; text-align: center;">Importing CSV data... Please wait.</div></div>`;
  
  // Allow the UI to render the "Please wait" message before locking the thread
  await new Promise(r => setTimeout(r, 50));
  
  let success = 0;
  let skipped = 0;
  const project = state.projects.find(p => p.id === session.currentProjectId);
  let maxTrayNum = state.trayCounters[project.id] || 0;
  
  for (let i = 1; i < lines.length; i++) {
    const cols = parseLine(lines[i]);
    if (cols.length <= idxPart || cols.length <= idxTray) continue;
    
    const partNum = cols[idxPart];
    if (!partNum || partNum === '#VALUE!') { skipped++; continue; }
    
    const trayNumRaw = parseInt(cols[idxTray], 10);
    if (isNaN(trayNumRaw)) { skipped++; continue; }
    maxTrayNum = Math.max(maxTrayNum, trayNumRaw);
    
    const brand = idxBrand >= 0 ? cols[idxBrand] : "Unknown";
    const gen = idxGen >= 0 && cols[idxGen] !== '#VALUE!' ? cols[idxGen] : "Unknown";
    const serial = idxSerial >= 0 && cols[idxSerial] !== '-' ? cols[idxSerial] : "";
    const scanRaw = idxScan >= 0 ? cols[idxScan] : "";
    let qty = 1;
    if (idxQty >= 0) {
      const parsedQty = parseInt(cols[idxQty], 10);
      if (!isNaN(parsedQty) && parsedQty > 0) qty = parsedQty;
    }
    
    // Find or create tray explicitly with this trayNum
    let tray = state.trays.find(t => t.projectId === project.id && t.trayNum === trayNumRaw);
    if (tray) {
      if (tray.partNumber.toUpperCase() !== partNum.toUpperCase()) {
        const replace = confirm(`Conflict in Tray #${trayNumRaw}!\n\nExisting part: ${tray.partNumber}\nCSV part: ${partNum}\n\nClick OK to REPLACE the tray's part number with the new one.\nClick Cancel to SKIP this row.`);
        if (replace) {
          tray.partNumber = partNum;
          tray.brand = brand;
          tray.generation = gen;
        } else {
          skipped++;
          continue;
        }
      }
    } else {
      tray = {
        id: `t_${project.id}_${trayNumRaw}_${Date.now()}_${i}`,
        projectId: project.id, ownerUserId: session.currentUser.id,
        partNumber: partNum, label: "", brand, generation: gen,
        trayNum: trayNumRaw, capacity: project.defaultCap, sticks: [],
        createdAt: Date.now(), createdBy: session.currentUser.id,
        projectName: project.name
      };
      state.trays.push(tray);
      await dbSave('trays', 'insert', tray);
    }
    
    const scanId = `s_${Date.now()}_${Math.floor(Math.random()*1000)}_${i}`;
    const newScan = {
      id: scanId, projectId: project.id, userId: session.currentUser.id,
      ts: Date.now() + i, scan: scanRaw,
      result: { partNumber: partNum, serial, brand, generation: gen, method: "csv_import" },
      trayId: tray.id, quantity: qty
    };
    
    for (let q = 0; q < qty; q++) {
      tray.sticks.push(scanId);
    }
    await dbSave('trays', 'update', { updates: { sticks: tray.sticks, partNumber: tray.partNumber, brand: tray.brand, generation: tray.generation }, id: tray.id }, 'id');
    
    state.scans.unshift(newScan);
    await dbSave('scans', 'insert', newScan);
    success++;
  }
  
  state.trayCounters[project.id] = maxTrayNum;
  window._pendingCSVImportLines = null;
  window._pendingCSVImportParseLine = null;
  document.getElementById("csv-upload").value = "";
  
  showToast(`Import complete: ${success} scans added (${skipped} skipped).`, "#3ed685");
  renderAdminPage();
}

async function changeUserRole(userId, newRole) {
  const u = state.users.find(u => u.id === userId);
  if (!u) return;
  u.role = newRole;
  await dbSave('users', 'update', { updates: { role: newRole }, id: u.id }, 'id');
  renderAdminPage();
}

/* ════════════════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════════════════ */
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}
function showModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal").classList.add("show");
}
function hideModal() {
  document.getElementById("modal").classList.remove("show");
}
function showToast(msg, color) {
  const c = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = "toast";
  t.style.color = color;
  t.style.border = `2px solid ${color}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
